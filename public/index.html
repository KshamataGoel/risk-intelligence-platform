.risk-flow-step.active-step { border-color:var(--primary) !important; box-shadow:0 0 0 3px var(--primary-light),var(--shadow-md) !important; }
.risk-flow-step.trigger.active-step { box-shadow:0 0 0 3px rgba(255,255,255,0.3),var(--shadow-md) !important; }
.flow-info-icon {
  position:absolute; top:8px; right:10px;
  font-size:12px; opacity:0.55; transition:opacity 0.15s;
  line-height:1;
}
.risk-flow-step:hover .flow-info-icon,
.risk-flow-step.active-step .flow-info-icon { opacity:1; }
.risk-flow-step.trigger .flow-info-icon,
.risk-flow-step.escalation .flow-info-icon { color:rgba(255,255,255,0.85); }

.flow-popover {
  background:var(--surface);
  border:1px solid var(--border);
  border-left:3px solid var(--primary);
  border-radius:var(--radius);
  padding:16px 18px;
  margin:4px 0 0;
  box-shadow:var(--shadow-lg);
  width:100%;
  min-width:300px;
  max-width:540px;
  animation:popoverIn 0.15s ease;
  position:relative;
  z-index:10;
}
@keyframes popoverIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
.flow-popover-title { font-size:13.5px; font-weight:700; color:var(--text); margin-bottom:4px; padding-right:20px; }
.flow-popover-close { position:absolute; top:10px; right:10px; background:none; border:none; cursor:pointer; color:var(--text-3); font-size:14px; padding:2px 4px; }
.flow-popover-close:hover { color:var(--text); }
.flow-popover-explanation { font-size:13px; color:var(--text-2); line-height:1.55; margin-bottom:12px; }
.flow-popover-meta { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; }
.flow-popover-tag { display:flex; align-items:center; gap:4px; font-size:11px; font-weight:600; }
.flow-popover-tag-label { color:var(--text-3); text-transform:uppercase; letter-spacing:0.4px; }
.flow-popover-tag-val { color:var(--text-2); }
.flow-evidence-block {
  background:#F8FAFC; border:1px solid var(--border); border-radius:var(--radius-sm);
  padding:10px 12px; font-size:12.5px; color:var(--text-2); line-height:1.6;
  font-style:italic; margin-bottom:10px;
  border-left:2px solid var(--primary);
}
.flow-evidence-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--primary); margin-bottom:4px; font-style:normal; }
.flow-popover-footer { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; }
.flow-source-ref { font-size:11px; color:var(--text-3); display:flex; align-items:center; gap:4px; }
.flow-view-source-btn { font-size:11.5px; font-weight:600; color:var(--primary); background:var(--primary-light); border:none; border-radius:20px; padding:4px 12px; cursor:pointer; font-family:inherit; transition:all 0.15s; display:flex; align-items:center; gap:5px; }
.flow-view-source-btn:hover { background:#f0dcdc; }

/* Source Drawer */
.source-drawer-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.35); z-index:2000; }
.source-drawer {
  position:fixed; top:0; right:0; bottom:0; width:420px; max-width:92vw;
  background:var(--surface); box-shadow:-4px 0 24px rgba(0,0,0,0.12);
  display:flex; flex-direction:column; z-index:2001;
  animation:drawerIn 0.22s ease;
}
@keyframes drawerIn { from{transform:translateX(100%)} to{transform:translateX(0)} }
.source-drawer-header {
  padding:20px 24px 16px; border-bottom:1px solid var(--border);
  display:flex; align-items:flex-start; justify-content:space-between; gap:12px;
}
.source-drawer-title { font-size:15px; font-weight:700; color:var(--text); line-height:1.3; }
.source-drawer-close { background:none; border:none; cursor:pointer; color:var(--text-3); font-size:18px; padding:2px; flex-shrink:0; }
.source-drawer-close:hover { color:var(--text); }
.source-drawer-body { flex:1; overflow-y:auto; padding:20px 24px; }
.source-drawer-section { margin-bottom:20px; }
.source-drawer-section-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.6px; color:var(--text-3); margin-bottom:6px; }
.source-drawer-section-val { font-size:13.5px; color:var(--text); line-height:1.65; }
.source-drawer-evidence { background:#F8FAFC; border:1px solid var(--border); border-left:3px solid var(--primary); border-radius:var(--radius-sm); padding:14px 16px; font-size:13px; color:var(--text-2); line-height:1.7; font-style:italic; margin-top:6px; }
.source-drawer-footer { padding:16px 24px; border-top:1px solid var(--border); font-size:11px; color:var(--text-3); }

.btn-outline { padding:9px 18px; background:var(--surface); color:var(--text); border:1.5px solid var(--border); border-radius:var(--radius); font-size:13.5px; font-weight:600; cursor:pointer; transition:all 0.15s; font-family:inherit; display:inline-flex; align-items:center; gap:7px; }
.btn-outline:hover { background:var(--bg); border-color:#CBD5E1; }

/* Enhanced Action Playbook */
.action-row-enhanced {
  border:1px solid var(--border); border-radius:var(--radius); margin-bottom:8px;
  background:var(--surface); overflow:hidden; transition:all 0.15s; cursor:pointer;
}
.action-row-enhanced:hover { border-color:#CBD5E1; box-shadow:var(--shadow); }
.action-row-enhanced.expanded { border-color:var(--primary); box-shadow:0 0 0 2px var(--primary-light); }
.action-row-header { display:flex; align-items:flex-start; gap:12px; padding:13px 16px; }
.action-row-main { flex:1; min-width:0; }
.action-row-title { font-size:13.5px; font-weight:600; color:var(--text); line-height:1.35; margin-bottom:3px; }
.action-row-short { font-size:12.5px; color:var(--text-2); line-height:1.4; }
.action-row-right { display:flex; align-items:center; gap:8px; flex-shrink:0; flex-wrap:wrap; justify-content:flex-end; }
.action-row-chevron { font-size:11px; color:var(--text-3); transition:transform 0.2s; }
.action-row-enhanced.expanded .action-row-chevron { transform:rotate(180deg); }
.action-row-owner { font-size:11px; color:var(--text-3); max-width:160px; text-align:right; line-height:1.3; display:none; }
@media(min-width:640px){ .action-row-owner { display:block; } }

.action-row-detail {
  border-top:1px solid var(--border); padding:16px 18px 16px 18px;
  background:linear-gradient(135deg,#fafbfc 0%,#f8f9fa 100%);
  animation:detailIn 0.15s ease;
}
@keyframes detailIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }
.action-detail-section { margin-bottom:12px; }
.action-detail-label { font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-3); margin-bottom:4px; }
.action-detail-text { font-size:13px; color:var(--text); line-height:1.7; }
.action-why-block { background:#FFFBEB; border:1px solid #FDE68A; border-left:3px solid #FFAD28; border-radius:var(--radius-sm); padding:10px 12px; font-size:13px; color:#78350F; line-height:1.65; margin-bottom:12px; }
.action-why-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:#FFAD28; margin-bottom:4px; }
.action-detail-meta { display:flex; flex-wrap:wrap; gap:8px 20px; margin-top:10px; padding-top:10px; border-top:1px solid var(--border); font-size:12px; color:var(--text-2); }
.action-meta-pair { display:flex; align-items:center; gap:4px; }
.action-meta-key { color:var(--text-3); font-weight:600; font-size:10.5px; text-transform:uppercase; letter-spacing:0.3px; }

.playbook-toolbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; flex-wrap:wrap; gap:8px; }
.playbook-count { font-size:12px; color:var(--text-3); }
.playbook-toolbar-btns { display:flex; gap:8px; }

.action-summary-panel {
  background:linear-gradient(135deg,rgba(255,173,40,0.06),rgba(28,31,28,0.98)); border:1px solid rgba(255,173,40,0.2);
  border-left:3px solid #FFAD28; border-radius:var(--radius); padding:16px 20px;
  margin-top:16px; font-size:13.5px; color:var(--text); line-height:1.8; white-space:pre-wrap;
}
.action-summary-header { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:#FFAD28; margin-bottom:8px; display:flex; align-items:center; gap:6px; }

/* Crisis Snapshot */
.crisis-snapshot-card {
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
  padding:20px 24px; margin-bottom:16px; box-shadow:var(--shadow);
}
.crisis-snapshot-header {
  display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; gap:12px;
}
.crisis-snapshot-title {
  font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.8px; color:var(--primary);
  display:flex; align-items:center; gap:6px;
}
.crisis-bullets { list-style:none; padding:0; margin:0; }
.crisis-bullet {
  display:flex; align-items:flex-start; gap:10px; padding:7px 0;
  border-bottom:1px solid #F1F5F9; font-size:13.5px; color:var(--text); line-height:1.5;
}
.crisis-bullet:last-child { border-bottom:none; }
.crisis-bullet-dot {
  width:7px; height:7px; min-width:7px; background:var(--primary);
  border-radius:50%; margin-top:6px; flex-shrink:0;
}

/* Actions dropdown */
.actions-dropdown-wrap { position:relative; }
.actions-dropdown-btn {
  display:flex; align-items:center; gap:6px; padding:7px 14px;
  background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius);
  font-size:13px; font-weight:600; color:var(--text); cursor:pointer; font-family:inherit;
  transition:all 0.15s; white-space:nowrap;
}
.actions-dropdown-btn:hover { background:var(--bg); border-color:rgba(255,255,255,0.18); }
.actions-dropdown-btn.open { border-color:var(--primary); background:var(--primary-light); color:var(--primary); }
.actions-dropdown-menu {
  position:absolute; top:calc(100% + 6px); right:0; min-width:210px;
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
  box-shadow:var(--shadow-lg); z-index:100; overflow:hidden;
  animation:popoverIn 0.12s ease;
}
.actions-dropdown-item {
  display:flex; align-items:center; gap:10px; padding:10px 16px;
  font-size:13px; font-weight:500; color:var(--text); cursor:pointer;
  background:none; border:none; width:100%; text-align:left; font-family:inherit;
  transition:background 0.1s;
}
.actions-dropdown-item:hover { background:var(--bg); }
.actions-dropdown-item i { width:14px; text-align:center; color:var(--primary); font-size:12px; }
.actions-dropdown-divider { height:1px; background:var(--border); margin:4px 0; }
.quant-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:14px; margin-top:4px; }
.quant-card {
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
  padding:18px 20px; box-shadow:var(--shadow); cursor:pointer; transition:all 0.15s; position:relative;
}
.quant-card:hover { box-shadow:var(--shadow-md); border-color:#CBD5E1; }
.quant-card.qc-open { border-color:var(--primary); box-shadow:0 0 0 2px var(--primary-light),var(--shadow-md); }
.quant-card-top { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; margin-bottom:10px; }
.quant-label { font-size:11px; font-weight:700; color:var(--text-3); text-transform:uppercase; letter-spacing:0.6px; }
.quant-info-icon { font-size:12px; color:var(--text-3); opacity:0.6; transition:opacity 0.15s; flex-shrink:0; margin-top:1px; }
.quant-card:hover .quant-info-icon, .quant-card.qc-open .quant-info-icon { opacity:1; color:var(--primary); }
.quant-narrative { font-size:13px; color:var(--text); line-height:1.7; margin-bottom:12px; font-style:italic; border-left:3px solid var(--primary); padding-left:10px; }
.quant-card-meta { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.quant-stripe { font-size:11px; color:var(--text-3); font-weight:500; }

.quant-popover {
  margin-top:10px; padding:14px 16px; background:#F8FAFC; border:1px solid var(--border);
  border-radius:var(--radius-sm); animation:popoverIn 0.15s ease;
}
.quant-popover-row { margin-bottom:8px; }
.quant-popover-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-3); margin-bottom:3px; }
.quant-popover-val { font-size:12.5px; color:var(--text-2); line-height:1.6; }
.quant-popover-evidence { background:#fff; border:1px solid var(--border); border-left:2px solid var(--primary); border-radius:var(--radius-sm); padding:8px 10px; font-size:12px; color:var(--text-2); line-height:1.6; font-style:italic; margin-top:4px; }

   GLOBAL DARK THEME OVERRIDES
   ══════════════════════════════════════════════════════════════ */

/* ── Body & Page Shell ── */

/* ── TopNav ── */

    var el = document.getElementById('__boot_error__');
    if (!el) return;
    el.style.display = 'block';
    el.textContent += 'ERROR: ' + e.message + '\n  at ' + (e.filename || '?') + ':' + (e.lineno || '?') + ':' + (e.colno || '?') + '\n' + (e.error && e.error.stack ? e.error.stack : '') + '\n\n';
  });
  window.addEventListener('unhandledrejection', function(e) {
    var el = document.getElementById('__boot_error__');
    if (!el) return;
    el.style.display = 'block';
    el.textContent += 'UNHANDLED PROMISE REJECTION: ' + (e.reason && e.reason.stack ? e.reason.stack : e.reason) + '\n\n';

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── Chart Config ─────────────────────────────────────────────────────────────
const CHART_PALETTE = [
  '#FFAD28','#B91C1C','#DC2626','#EF4444',
  '#1E3A5F','#1E40AF','#2563EB','#3B82F6',
  '#7C3AED','#059669'
];

function buildChartConfig(type, data, title, highlightIndex, highlightType) {
  const fmt = v => typeof v === 'number' && v > 1000 ? `£${v.toLocaleString()}` : String(v);

  const baseOpts = {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { position: 'top', labels: { font: { family: 'Inter', size: 12 }, padding: 16, color: '#E2E8F0' } },
      title: {
        display: true, text: title,
        font: { family: 'Inter', size: 15, weight: '600' },
        color: '#E2E8F0', padding: { bottom: 16 }
      }
    }
  };

  if (type === 'bar') {
    const maxIdx  = data.values.indexOf(Math.max(...data.values));
    const hlIdx   = highlightIndex != null ? highlightIndex : maxIdx;
    const isMin   = highlightType === 'min';
    const bgColors  = data.values.map((_, i) => i === hlIdx ? '#FFAD28' : 'rgba(148,163,184,0.35)');
    const hvrColors = data.values.map((_, i) => i === hlIdx ? '#B91C1C' : 'rgba(148,163,184,0.55)');
    return {
      type: 'bar',
      data: {
        labels: data.labels,
        datasets: [{
          label: 'Count',
          data: data.values,
          backgroundColor: bgColors,
          hoverBackgroundColor: hvrColors,
          borderRadius: 4,
          borderSkipped: false
        }]
      },
      options: {
        ...baseOpts,
        plugins: {
          ...baseOpts.plugins,
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => {
                const val = ctx.parsed.y;
                const suffix = ctx.dataIndex === hlIdx ? (isMin ? '  ★ Smallest' : '  ★ Largest') : '';
                return ` ${val.toLocaleString()}${suffix}`;
              }
            }
          }
        },
        scales: {
          x: { grid: { display: false }, ticks: { font: { family: 'Inter', size: 12 }, color: '#94A3B8' } },
          y: { grid: { color: 'rgba(255,255,255,0.07)' }, ticks: { font: { family: 'Inter', size: 12 }, color: '#94A3B8' }, beginAtZero: true }
        }
      }
    };
  }

  if (type === 'doughnut') {
    const hlIdx = highlightIndex != null ? highlightIndex : data.values.indexOf(Math.max(...data.values));
    const isMin = highlightType === 'min';
    const bgColors = CHART_PALETTE.map((c, i) => i === hlIdx ? '#FFAD28' : c);
    return {
      type: 'doughnut',
      data: {
        labels: data.labels,
        datasets: [{
          data: data.values,
          backgroundColor: bgColors,
          hoverOffset: 8,
          borderWidth: 2,
          borderColor: '#fff'
        }]
      },
      options: {
        ...baseOpts,
        plugins: {
          ...baseOpts.plugins,
          legend: { position: 'right', labels: { font: { family: 'Inter', size: 12 }, padding: 14, color: '#E2E8F0' } },
          tooltip: {
            callbacks: {
              label: ctx => {
                const val = ctx.parsed;
                const suffix = ctx.dataIndex === hlIdx ? (isMin ? '  ★ Smallest' : '  ★ Highlighted') : '';
                return ` ${val.toLocaleString()}${suffix}`;
              }
            }
          }
        },
        cutout: '62%'
      }
    };
  }

  if (type === 'horizontalBar') {
    const maxIdx  = data.values.indexOf(Math.max(...data.values));
    const hlIdx   = highlightIndex != null ? highlightIndex : maxIdx;
    const isMin   = highlightType === 'min';
    const bgColors  = data.values.map((_, i) => i === hlIdx ? '#FFAD28' : 'rgba(148,163,184,0.35)');
    const hvrColors = data.values.map((_, i) => i === hlIdx ? '#B91C1C' : 'rgba(148,163,184,0.55)');
    const isGBP = data.values.some(v => v > 10000);
    return {
      type: 'bar',
      data: {
        labels: data.labels,
        datasets: [{
          label: 'Value',
          data: data.values,
          backgroundColor: bgColors,
          hoverBackgroundColor: hvrColors,
          borderRadius: 4,
          borderSkipped: false
        }]
      },
      options: {
        ...baseOpts,
        indexAxis: 'y',
        plugins: {
          ...baseOpts.plugins,
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => {
                const val = ctx.raw;
                const suffix = ctx.dataIndex === hlIdx ? (isMin ? '  ★ Lowest' : '  ★ Highest') : '';
                return isGBP ? `  £${val.toLocaleString()}${suffix}` : `  ${val.toLocaleString()}${suffix}`;
              }
            }
          }
        },
        scales: {
          x: {
            grid: { color: 'rgba(255,255,255,0.07)' },
            ticks: { font: { family: 'Inter', size: 12 }, color: '#94A3B8', callback: v => isGBP ? `£${Number(v).toLocaleString()}` : Number(v).toLocaleString() },
            beginAtZero: true
          },
          y: { grid: { display: false }, ticks: { font: { family: 'Inter', size: 12 }, color: '#94A3B8' } }
        }
      }
    };
  }

  if (type === 'line') {
    return {
      type: 'line',
      data: {
        labels: data.labels,
        datasets: [{
          label: 'Transaction Volume',
          data: data.values,
          borderColor: '#FFAD28',
          backgroundColor: 'rgba(255,173,40,0.08)',
          borderWidth: 2.5,
          fill: true,
          tension: 0.4,
          pointBackgroundColor: '#FFAD28',
          pointRadius: 5,
          pointHoverRadius: 7
        }]
      },
      options: {
        ...baseOpts,
        plugins: {
          ...baseOpts.plugins,
          tooltip: { callbacks: { label: ctx => `  £${ctx.raw.toLocaleString()}` } }
        },
        scales: {
          x: { grid: { display: false }, ticks: { font: { family: 'Inter', size: 12 }, color: '#94A3B8' } },
          y: {
            grid: { color: 'rgba(255,255,255,0.07)' },
            ticks: { font: { family: 'Inter', size: 12 }, color: '#94A3B8', callback: v => `£${Number(v).toLocaleString()}` },
            beginAtZero: true
          }
        }
      }
    };
  }

  return null;
}

// ── Components ───────────────────────────────────────────────────────────────

function ChartComponent({ type, data, title, highlightIndex, highlightType }) {
  const canvasRef = useRef(null);
  const chartRef  = useRef(null);

  useEffect(() => {
    if (!canvasRef.current || !data) return;
    if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }

    const cfg = buildChartConfig(type, data, title, highlightIndex, highlightType);
    if (!cfg) return;
    chartRef.current = new Chart(canvasRef.current.getContext('2d'), cfg);
    return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
  }, [type, title, JSON.stringify(data), highlightIndex, highlightType]);

  return (
    <div className="chart-container">
      <canvas ref={canvasRef}></canvas>
    </div>
  );
}

function MetricsRow({ metrics }) {
  if (!metrics) return null;
  const entries = Object.entries(metrics);
  return (
    <div className="metrics-row">
      {entries.map(([k, v]) => (
        <div key={k} className="metric-card">
          <div className="metric-label">{k}</div>
          <div className="metric-value">{typeof v === 'number' ? v.toLocaleString() : v}</div>
        </div>
      ))}
    </div>
  );
}

function DataTable({ columns, preview }) {
  if (!preview || !preview.length) return null;
  return (
    <div className="table-wrap">

}

function minDelay(minMs, maxMs) {
  const ms = minMs + Math.random() * (maxMs - minMs);
  return new Promise(resolve => setTimeout(resolve, ms));
}

function ProcessingView({ title, messages, icon }) {
  const [msgIdx,   setMsgIdx]   = useState(0);
  const [fade,     setFade]     = useState(true);

  useEffect(() => {
  }, []);

  useEffect(() => {
    const cycle = () => {
      const delay = 3200 + Math.random() * 1600;
      return setTimeout(() => {
        setFade(false);
        setTimeout(() => {
          setMsgIdx(i => (i + 1) % messages.length);
          setFade(true);
          cycleRef.current = cycle();
        }, 400);
      }, delay);
    };
    const cycleRef = { current: cycle() };
    return () => clearTimeout(cycleRef.current);
  }, []);

  return (
    <div className="processing-view">
      <div className="processing-icon-ring">
        <i className={`fa-solid ${icon || 'fa-microchip-ai'}`}></i>
      </div>
      <div className="processing-title">{title || 'Processing…'}</div>
      <div className="processing-msg" style={{opacity: fade ? 1 : 0}}>{messages[msgIdx]}</div>
      <div className="processing-bar-wrap"><div className="processing-bar"></div></div>
    </div>
  );
}

const SECTION_ICONS = { A: 'fa-bullseye', B: 'fa-magnifying-glass-chart', C: 'fa-shield-halved', D: 'fa-gears', E: 'fa-chart-line', F: 'fa-database' };
const SECTION_COLORS = { A: 'section-blue', B: 'section-blue', C: 'section-orange', D: 'section-purple', E: 'section-teal', F: 'section-gray' };

function SummaryView({ text }) {
  if (!text) return null;
  const sectionRegex = /^([A-F])\.\s*([^:\n]+):\s*(.+)$/gm;
  const sections = [];
  let match;
  while ((match = sectionRegex.exec(text)) !== null) {
    sections.push({ key: match[1], label: match[2].trim(), content: match[3].trim() });
  }
  if (sections.length >= 3) {
    return (
      <div className="summary-sections">
        {sections.map(s => (
          <div key={s.key} className={`summary-section ${SECTION_COLORS[s.key] || ''}`}>
            <div className="summary-section-label">
              <i className={`fa-solid ${SECTION_ICONS[s.key] || 'fa-circle'}`}></i>
              <span>{s.key}. {s.label}</span>
            </div>
            <div className="summary-section-content">{s.content}</div>
          </div>
        ))}
      </div>
    );
  }
  return <div className="summary-text">{text}</div>;
}

function InsightsPage() {
  const [question,    setQuestion]    = useState('');
  const [loading,     setLoading]     = useState(false);
  const [result,      setResult]      = useState(null);
  const [error,       setError]       = useState(null);
  const [catalogue,   setCatalogue]   = useState([]);
  const [showPreview, setShowPreview] = useState(false);

  useEffect(() => {
    fetch('/api/catalogue')
      .then(r => r.json())
      .then(d => setCatalogue(d.datasets || []))
      .catch(() => {});
  }, []);

  const ask = useCallback(async (q) => {
    const text = (q || question).trim();
    if (!text) return;
    setLoading(true); setResult(null); setError(null); setShowPreview(false);
    try {
      const [res] = await Promise.all([
        fetch('/api/insights', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ question: text }) }),
        minDelay(8000, 15000)
      ]);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Server error');
      setResult(data);
    } catch (err) {
      setError(err.message || 'Failed to connect to server.');
    } finally {
      setLoading(false);
    }
  }, [question]);

  const handleSuggested = (text) => { setQuestion(text); ask(text); };

  const handleKey = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); ask(); } };

  return (
    <div className="page">
      {/* Header */}
      <div className="page-header">
        <div className="page-title">Intelligence Center</div>
        <div className="page-sub">
          Ask questions across approved Risk &amp; Compliance datasets.
          
        </div>
      </div>


      {/* Suggested questions */}
      <div className="questions-grid">
        {SUGGESTED.map((s, i) => (
          <button key={i} className="q-card" onClick={() => handleSuggested(s.text)}>
            <div className="q-card-icon"><i className={`fa-solid ${s.icon}`}></i></div>
            <div>
              <div className="q-card-text">{s.text}</div>
              <div className="q-card-badge">{s.tag}</div>
            </div>
          </button>
        ))}
      </div>

      {/* Input */}
      <div className="input-row">
        <input
          className="input-box"
          type="text"
          placeholder="Ask a question about your risk data…"
          value={question}
          onChange={e => setQuestion(e.target.value)}
          onKeyDown={handleKey}
        />
        <button className="btn-primary" onClick={() => ask()} disabled={loading || !question.trim()}>
          {loading
            ? <><div className="spinner" style={{width:16,height:16,borderWidth:2}}></div> Analysing…</>
            : <><i className="fa-solid fa-paper-plane"></i> Ask</>}
        </button>
      </div>

      {/* Loading */}
      {loading && (
        <ProcessingView
          title="Analysing Intelligence Data"
          icon="fa-chart-bar"
          messages={[
            'Scanning dataset dimensions…',
            'Executing semantic query layer…',
            'Resolving risk data entities…',
            'Aggregating cross-dataset signals…',
            'Applying analytical filters…',
            'Constructing insight response…',
            'Validating output against schema…',
          ]}
        />
      )}

      {/* Error */}
      {error && (
        <div className="alert alert-error">
          <i className="fa-solid fa-circle-exclamation alert-icon"></i>
          {error}
        </div>
      )}

      {/* Not found */}
      {result && !result.answer_available && (
        <div className="alert alert-info">
          <i className="fa-solid fa-triangle-exclamation alert-icon"></i>
          {result.message}
        </div>
      )}

      {/* Results */}
      {result && result.answer_available && (
        <div>
          {/* Concentration / Trend Alert Banner */}
          {result.concentration_insight && (
            <div className="concentration-banner">
              <i className="fa-solid fa-triangle-exclamation"></i>
              {result.concentration_insight}
            </div>
          )}

          {/* Structured Intelligence Brief */}
          <div className="summary-card">
            <div className="summary-header">
              <i className="fa-solid fa-brain summary-icon"></i>
              <span className="summary-label">Intelligence Brief</span>
            </div>
            <SummaryView text={result.summary} />
          </div>

          {/* Metrics */}
          <MetricsRow metrics={result.key_metrics} />

          {/* Chart */}
          <div className="card chart-card">
            <div className="card-header">
              <span className="card-title">{result.title}</span>
              <span className="ds-chip">
                <i className="fa-solid fa-table"></i>
                {result.dataset_used.replace(/_/g, ' ')}
              </span>
            </div>
            <ChartComponent
              type={result.chart_type}
              data={result.chart_data}
              title=""
              highlightIndex={result.highlight_index}
              highlightType={result.highlight_type}
            />
          </div>

          {/* Data Quality Note */}
          {result.quality_note && (
            <div className="quality-note">
              <i className="fa-solid fa-circle-info"></i>
              {result.quality_note}
            </div>
          )}

          {/* Source + preview */}
          <div className="info-row">
            <span><i className="fa-solid fa-database"></i> Dataset: <strong>{result.dataset_used.replace(/_/g, ' ')}</strong></span>
            <span><i className="fa-solid fa-lock"></i> Source: Approved Excel datasets only — no external data used</span>
          </div>

          {/* Preview toggle */}
          <button className="preview-toggle" onClick={() => setShowPreview(p => !p)}>
            <i className={`fa-solid fa-chevron-${showPreview ? 'up' : 'down'}`}></i>
            {showPreview ? 'Hide' : 'Show'} data preview (first 10 rows)
          </button>
          {showPreview && <DataTable columns={result.columns} preview={result.preview} />}

          {/* Follow-up suggestions */}
          {FOLLOWUPS[result.dataset_used] && (
            <div className="followup-section">
              <div className="followup-label">Suggested follow-up questions</div>
              <div className="followup-list">
                {FOLLOWUPS[result.dataset_used].map((q, i) => (
                  <button key={i} className="followup-btn" onClick={() => handleSuggested(q)}>{q}</button>
                ))}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── Scenario Chart helper ─────────────────────────────────────────────────────
function buildScenarioChartCfg(chartInfo, opts = {}) {
  if (!chartInfo || !chartInfo.available || !chartInfo.chart_data) return null;
  const { type, chart_data, multi } = chartInfo;
  const { xLabel, yLabel, enableZoom } = opts;

  const PALETTE = ['#FFAD28','#1E3A5F','#059669','#FFAD28','#7C3AED','#DB2777','#0284C7'];

  const axisTitle = (label) => label ? { display:true, text:label, color:'#64748B', font:{family:'Inter',size:11,weight:'500'} } : {};

  const zoomCfg = enableZoom ? {
    zoom: { zoom:{ wheel:{enabled:true}, pinch:{enabled:true}, mode:'xy' }, pan:{enabled:true,mode:'xy'} }
  } : {};

  const baseOpts = {
    responsive:true, maintainAspectRatio:false,
    plugins:{
      legend:{ position:'bottom', labels:{ font:{family:'Inter',size:11}, padding:12, boxWidth:12, color:'#E2E8F0' } },
      title:{ display:false },
      tooltip:{ callbacks:{ label: ctx => ` ${ctx.dataset.label || ''}: ${ctx.formattedValue}` } },
      zoom: enableZoom ? zoomCfg.zoom : undefined
    }
  };

  const scaleFont = { family:'Inter', size:11 };

  if (multi) {
    const datasets = chart_data.datasets.map((ds, i) => ({
      label: ds.label,
      data:  ds.values,
      backgroundColor: PALETTE[i % PALETTE.length] + 'CC',
      borderColor:     PALETTE[i % PALETTE.length],
      borderWidth: 1,
      borderRadius: 3
    }));
    return {
      type: 'bar',
      data: { labels: chart_data.labels, datasets },
      options: {
        ...baseOpts,
        indexAxis: type === 'horizontalBar' ? 'y' : 'x',
        scales:{
          x:{ stacked:false, grid:{color:'rgba(255,255,255,0.07)'}, ticks:{font:scaleFont, color:'#94A3B8'}, title:{ display:!!xLabel, text:xLabel||'', color:'#94A3B8', font:{...scaleFont,weight:'500'} } },
          y:{ stacked:false, grid:{color:'rgba(255,255,255,0.07)'}, ticks:{font:scaleFont, color:'#94A3B8'}, beginAtZero:true, title:{ display:!!yLabel, text:yLabel||'', color:'#94A3B8', font:{...scaleFont,weight:'500'} } }
        }
      }
    };
  }

  return {
    type: type === 'horizontalBar' ? 'bar' : (type === 'line' ? 'line' : 'bar'),
    data:{
      labels: chart_data.labels,
      datasets:[{
        label: chartInfo.title || '',
        data: chart_data.values,
        backgroundColor: type === 'line' ? 'rgba(255,173,40,0.1)' : PALETTE.map((c,i) => i===0?'#FFAD28':c+'99'),
        borderColor: '#FFAD28',
        borderWidth: type === 'line' ? 2.5 : 0,
        fill: type === 'line',
        tension: type === 'line' ? 0.4 : 0,
        pointBackgroundColor: '#FFAD28',
        pointRadius: type === 'line' ? 4 : 0,
        borderRadius: type === 'line' ? 0 : 4
      }]
    },
    options:{
      ...baseOpts,
      indexAxis: type === 'horizontalBar' ? 'y' : 'x',
      plugins:{...baseOpts.plugins, legend:{display:false}},
      scales:{
        x:{ grid:{color:'rgba(255,255,255,0.07)'}, ticks:{font:scaleFont, color:'#94A3B8'}, title:{ display:!!xLabel, text:xLabel||'', color:'#94A3B8', font:{...scaleFont,weight:'500'} } },
        y:{ grid:{color:'rgba(255,255,255,0.07)'}, ticks:{font:scaleFont, color:'#94A3B8'}, beginAtZero:true, title:{ display:!!yLabel, text:yLabel||'', color:'#94A3B8', font:{...scaleFont,weight:'500'} } }
      }
    }
  };
}

function ScenarioChart({ chartInfo, opts }) {
  const canvasRef = useRef(null);
  const chartRef  = useRef(null);
  useEffect(() => {
    if (!canvasRef.current) return;
    if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }
    const cfg = buildScenarioChartCfg(chartInfo, opts || {});
    if (!cfg) return;
    chartRef.current = new Chart(canvasRef.current.getContext('2d'), cfg);
    return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
  }, [JSON.stringify(chartInfo), JSON.stringify(opts)]);

  if (!chartInfo || !chartInfo.available) {
    return <div className="scenario-chart-unavail"><i className="fa-solid fa-circle-info" style={{marginRight:6}}></i>Chart data not available in uploaded Excel file.</div>;
  }
  return <div style={{position:'relative',height:'100%'}}><canvas ref={canvasRef}></canvas></div>;
}

// ── Chart Expand Modal ────────────────────────────────────────────────────────
function ChartExpandModal({ sheetKey, chartInfo, onClose }) {
  const meta = CHART_META[sheetKey] || {};
  const chartRef = useRef(null);
  const title = chartInfo?.title || sheetKey.replace(/_/g,' ');

  const handleZoom = (dir) => {
    if (!chartRef.current) return;
    const chart = chartRef.current;
    if (dir === 'in')    chart.zoom(1.2);
    else if (dir === 'out') chart.zoom(0.8);
    else chart.resetZoom();
  };

  const handleExport = () => {
    if (!chartRef.current) return;
    const url = chartRef.current.toBase64Image();
    const a = document.createElement('a');
    a.href = url;
    a.download = `${title.replace(/\s+/g,'_')}.png`;
    a.click();
  };

  useEffect(() => {
    const handler = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', handler);
    return () => document.removeEventListener('keydown', handler);
  }, []);

  return (
    <div className="chart-modal-overlay" onClick={onClose}>
      <div className="chart-modal" onClick={e => e.stopPropagation()}>
        <div className="chart-modal-hdr">
          <div className="chart-modal-hdr-text">
            <div className="chart-modal-title">{title}</div>
            {meta.description && <div className="chart-modal-desc">{meta.description}</div>}
          </div>
          <div className="chart-modal-controls">
            <button className="chart-zoom-btn" onClick={() => handleZoom('in')} title="Zoom in"><i className="fa-solid fa-magnifying-glass-plus"></i></button>
            <button className="chart-zoom-btn" onClick={() => handleZoom('out')} title="Zoom out"><i className="fa-solid fa-magnifying-glass-minus"></i></button>
            <button className="chart-zoom-btn" onClick={() => handleZoom('reset')} title="Reset zoom" style={{fontSize:11}}>Reset</button>
            <button className="chart-zoom-btn" onClick={handleExport} title="Export as PNG"><i className="fa-solid fa-download"></i></button>
            <button className="chart-icon-btn" onClick={onClose} title="Close" style={{marginLeft:4,fontSize:16}}><i className="fa-solid fa-xmark"></i></button>
          </div>
        </div>
        <div className="chart-modal-body" style={{height:480}}>
          <ChartModalCanvas chartInfo={chartInfo} meta={meta} chartRef={chartRef} />
        </div>
      </div>
    </div>
  );
}

function ChartModalCanvas({ chartInfo, meta, chartRef }) {
  const canvasRef = useRef(null);
  const instanceRef = useRef(null);
  useEffect(() => {
    if (!canvasRef.current) return;
    if (instanceRef.current) { instanceRef.current.destroy(); instanceRef.current = null; }
    const cfg = buildScenarioChartCfg(chartInfo, { xLabel: meta.xLabel, yLabel: meta.yLabel, enableZoom: true });
    if (!cfg) return;
    instanceRef.current = new Chart(canvasRef.current.getContext('2d'), cfg);
    chartRef.current = instanceRef.current;
    return () => { if (instanceRef.current) { instanceRef.current.destroy(); instanceRef.current = null; } };
  }, [JSON.stringify(chartInfo)]);
  return <div style={{position:'relative',height:'100%'}}><canvas ref={canvasRef}></canvas></div>;
}

function HeatmapTable({ chartInfo }) {
  if (!chartInfo || !chartInfo.available || !chartInfo.rows || !chartInfo.rows.length) {
    return <div className="scenario-chart-unavail"><i className="fa-solid fa-circle-info" style={{marginRight:6}}></i>Chart data not available in uploaded Excel file.</div>;
  }
  const { rows, columns } = chartInfo;
  const labelCol  = columns[0];
  const dayCols   = columns.slice(1);

  const sevClass = (val) => {
    if (val === null || val === undefined || val === '') return '';
    const s = String(val).toLowerCase();
    if (s === 'critical' || s === '4' || (typeof val === 'number' && val >= 4)) return 'hm-critical';
    if (s === 'breach' || s === 'high' || s === '3' || (typeof val === 'number' && val >= 3)) return 'hm-high';
    if (s === 'elevated' || s === 'medium' || s === '2' || (typeof val === 'number' && val >= 2)) return 'hm-elevated';
    return 'hm-normal';
  };

  return (
    <div className="heatmap-wrap">
      <table className="heatmap-table">
        <thead>
          <tr>
            <th>{labelCol}</th>
            {dayCols.map(c => <th key={c}>{c}</th>)}
          </tr>
        </thead>
        <tbody>
          {rows.map((row, i) => (
            <tr key={i}>
              <td>{String(row[labelCol] ?? '')}</td>
              {dayCols.map(c => <td key={c} className={sevClass(row[c])}>{row[c] !== null && row[c] !== undefined ? String(row[c]) : '—'}</td>)}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function RtmEdge({ x1, y1, x2, y2 }) {
  const d = `M${x1},${y1} C${x1},${y1+22} ${x2},${y2-22} ${x2},${y2}`;
  return (
    <path d={d} fill="none" stroke="#c0392b" strokeWidth={1.3} opacity={0.65}
      strokeDasharray="5 4"
      style={{ animation: 'rtm-dash 0.9s linear infinite' }} />
  );
}

function RtmBox({ x, y, w, h, fill, stroke, textFill, t, t2, fs }) {
  const fz = fs || 10.5;
  return (
    <g>
      <rect x={x} y={y} width={w} height={h} rx={5} fill={fill} stroke={stroke} strokeWidth={1.5} />
      {t2 ? (
        <>
          <text x={x+w/2} y={y+h/2-6} textAnchor="middle" dominantBaseline="middle" fontSize={fz} fontWeight="600" fill={textFill} fontFamily="inherit">{t}</text>
          <text x={x+w/2} y={y+h/2+7} textAnchor="middle" dominantBaseline="middle" fontSize={fz} fontWeight="600" fill={textFill} fontFamily="inherit">{t2}</text>
        </>
      ) : (
        <text x={x+w/2} y={y+h/2+1} textAnchor="middle" dominantBaseline="middle" fontSize={fz} fontWeight="600" fill={textFill} fontFamily="inherit">{t}</text>
      )}
    </g>
  );
}

function RtmLabel({ x, y, label }) {
  return (
    <text x={x} y={y} textAnchor="end" dominantBaseline="middle"
      fontSize={9} fontWeight="700" fill="#7a8490" fontFamily="inherit"
      style={{ textTransform: 'uppercase', letterSpacing: '0.5px' }}>
      {label}
    </text>
  );
}

function RiskTransmissionMap() {
  const [phase, setPhase] = React.useState(0);

  // Phases:
  // 1=Trigger, 2=Scope, 3=Scope→L1 lines, 4=L1, 5=L1→L2 lines,
  // 6=L2, 7=L2→L3 lines, 8=L3, 9=L3→Meas lines, 10=Measurement,
  // 11=Meas→Impact lines, 12=Impact, 13=Action
  React.useEffect(() => {
    const delays = [400,1000,1650,2200,2800,3350,3900,4450,5050,5700,6350,7000,7650];
    const timers = delays.map((d, i) => setTimeout(() => setPhase(i + 1), d));
    return () => timers.forEach(clearTimeout);
  }, []);

  const rowStyle   = (minPhase) => ({ opacity: phase >= minPhase ? 1 : 0, transition: 'opacity 0.5s' });

  const Y = { trig: 26, scope: 94, l1: 162, l2: 230, l3: 298, meas: 380, imp: 450, lim: 488, act: 536 };
  const midY = (y, h) => y + (h || NH) / 2;

  const nodes = {

    sle:  { x:289, y:Y.scope, w:114, h:NH, ...S,  t:'Les – ME Entities' },

    sins: { x:545, y:Y.scope, w:106, h:NH, ...S,  t:'Instruments' },
    sde:  { x:666, y:Y.scope, w:78,  h:NH, ...S,  t:'Desks' },
    sib:  { x:759, y:Y.scope, w:78,  h:NH, ...S,  t:'IBS/BPs' },

    l1tr: { x:185, y:Y.l1, w:166, h:NH, ...S,  t:'Traded Risk' },
    l1cr: { x:412, y:Y.l1, w:136, h:NH, ...S,  t:'Credit Risk' },
    l1or: { x:610, y:Y.l1, w:152, h:NH, ...S,  t:'Operational Risk' },
    l1ty: { x:828, y:Y.l1, w:136, h:NH, ...S,  t:'Treasury Risk' },

    l2mr: { x:185, y:Y.l2, w:122, h:NH, ...S,  t:'Market Risk' },
    l2cc: { x:323, y:Y.l2, w:80,  h:NH, ...S,  t:'CCR' },
    l2co: { x:418, y:Y.l2, w:120, h:NH, ...S,  t:'Country Risk' },
    l2cm: { x:554, y:Y.l2, w:140, h:NH, ...S,  t:'Credit Migration' },
    l2lq: { x:828, y:Y.l2, w:128, h:NH, ...S,  t:'Liquidity Risk' },

    l3fx: { x:146, y:Y.l3, w:60,  h:NH, ...S,  t:'FX' },
    l3eq: { x:213, y:Y.l3, w:60,  h:NH, ...S,  t:'EQ' },
    l3ir: { x:280, y:Y.l3, w:60,  h:NH, ...S,  t:'IR' },
    l3cs: { x:347, y:Y.l3, w:60,  h:NH, ...S,  t:'CS' },
    l3dc: { x:422, y:Y.l3, w:136, h:NH, ...S,  t:'Default/', t2:'Credit Spread' },
    l3co: { x:572, y:Y.l3, w:120, h:NH, ...S,  t:'Collateral Risk' },
    l3mc: { x:708, y:Y.l3, w:130, h:NH, ...Hi, t:'Margin Call', t2:'Volumes' },
    l3al: { x:852, y:Y.l3, w:116, h:NH, ...S,  t:'Asset Liquidity' },

    mv:   { x:146, y:Y.meas, w:104, h:36, ...MR, t:'Trading', t2:'VaR' },
    mp:   { x:257, y:Y.meas, w:70,  h:36, ...MR, t:'PVBP' },
    mcs:  { x:334, y:Y.meas, w:68,  h:36, ...MR, t:'CS01' },
    mf:   { x:409, y:Y.meas, w:128, h:36, ...MR, t:'FX net short', t2:'position' },
    mep:  { x:544, y:Y.meas, w:126, h:36, ...MR, t:'Exposure/', t2:'Position' },
    mpe:  { x:686, y:Y.meas, w:68,  h:36, ...MN, t:'PFE' },
    mva:  { x:761, y:Y.meas, w:68,  h:36, ...MN, t:'CVA' },
    mpd:  { x:836, y:Y.meas, w:60,  h:36, ...MN, t:'PD' },
    mel:  { x:903, y:Y.meas, w:60,  h:36, ...MN, t:'ECL' },

    ir1:  { x:146, y:Y.imp, w:70,  h:NH, ...S,  t:'RWA' },
    ic1:  { x:223, y:Y.imp, w:80,  h:NH, ...S,  t:'Capital' },
    ip1:  { x:310, y:Y.imp, w:60,  h:NH, ...S,  t:'PnL' },
    ir2:  { x:432, y:Y.imp, w:70,  h:NH, ...S,  t:'RWA' },
    ic2:  { x:509, y:Y.imp, w:80,  h:NH, ...S,  t:'Capital' },
    ip2:  { x:596, y:Y.imp, w:60,  h:NH, ...S,  t:'PnL' },
    icf:  { x:706, y:Y.imp, w:108, h:NH, ...S,  t:'Cost of', t2:'funds' },
    ish:  { x:822, y:Y.imp, w:126, h:NH, ...S,  t:'Survival', t2:'Horizon' },
    ip3:  { x:958, y:Y.imp, w:60,  h:NH, ...S,  t:'PnL' },
  };

  const ncx  = (id) => nodes[id].x + nodes[id].w / 2;
  const nbot = (id) => nodes[id].y + nodes[id].h;
  const ntop = (id) => nodes[id].y;

  // Edge groups — lines appear AFTER both connected rows are visible
  const edgeGroups = [
    { phase: 4,  pairs: [['sg','l1tr'],['sbl','l1tr'],['sle','l1cr'],['sins','l1cr'],['sins','l1or'],['sde','l1or'],['sib','l1ty']] },
    { phase: 6,  pairs: [['l1tr','l2mr'],['l1cr','l2cc'],['l1cr','l2co'],['l1cr','l2cm'],['l1ty','l2lq']] },
    { phase: 8,  pairs: [['l2mr','l3fx'],['l2mr','l3eq'],['l2mr','l3ir'],['l2mr','l3cs'],['l2cc','l3dc'],['l2co','l3co'],['l2cm','l3co'],['l2lq','l3mc'],['l2lq','l3al']] },
    { phase: 10, pairs: [['l3fx','mv'],['l3eq','mv'],['l3ir','mv'],['l3ir','mp'],['l3cs','mcs'],['l3fx','mf'],['l3dc','mep'],['l3co','mpe'],['l3co','mva'],['l3mc','mpd'],['l3al','mel']] },
    { phase: 12, pairs: [['mv','ir1'],['mv','ic1'],['mp','ir1'],['mcs','ip1'],['mep','ir2'],['mep','ic2'],['mpe','ip2'],['mva','ic2'],['mpd','icf'],['mel','ish']] },
  ];

  const scopeRow = ['sg','sle','sbl','sins','sde','sib'];
  const l1Row    = ['l1tr','l1cr','l1or','l1ty'];
  const l2Row    = ['l2mr','l2cc','l2co','l2cm','l2lq'];
  const l3Row    = ['l3fx','l3eq','l3ir','l3cs','l3dc','l3co','l3mc','l3al'];
  const measRow  = ['mv','mp','mcs','mf','mep','mpe','mva','mpd','mel'];
  const impRow   = ['ir1','ic1','ip1','ir2','ic2','ip2','icf','ish','ip3'];

  return (
    <div className="rtm-wrap">
      <div className="rtm-canvas-wrap">
        <svg viewBox="0 0 1050 588" preserveAspectRatio="xMidYMid meet"
          xmlns="http://www.w3.org/2000/svg" style={{ width:'100%', height:'auto', fontFamily:'inherit' }}>

          {/* Edge groups — each fades in at its own phase */}
          {edgeGroups.map((grp) => (
            <g key={grp.phase} style={edgeStyle(grp.phase)}>
              {grp.pairs.map(([a,b], i) => (
                <RtmEdge key={i} x1={ncx(a)} y1={nbot(a)} x2={ncx(b)} y2={ntop(b)} />
              ))}
            </g>
          ))}

          {/* Phase 1 — Trigger */}
          <g style={rowStyle(1)}>
            <RtmLabel x={128} y={midY(Y.trig)} label="Trigger" />
            <rect x={180} y={Y.trig} width={860} height={NH} rx={5} fill="#2d1e0c" stroke="#8B5e30" strokeWidth={1.5} />
            <text x={610} y={midY(Y.trig)+1} textAnchor="middle" dominantBaseline="middle"
              fontSize={11} fontWeight="700" fill="#ffcf88" fontFamily="inherit">
              Closure of an exchange due to a cyber attack (CME Exchange Failure)
            </text>
          </g>

          {/* Phase 2 — Scope */}
          <g style={rowStyle(2)}>
            <RtmLabel x={128} y={midY(Y.scope)} label="Scope" />
            {scopeRow.map(id => <RtmBox key={id} {...nodes[id]} />)}
          </g>

          {/* Phase 3 — Risk Stripe L1 + bracket */}
          <g style={rowStyle(3)}>
            <rect x={131} y={Y.l1-2} width={3} height={(Y.l3+NH)-(Y.l1-2)} rx={1.5} fill="#c0392b" opacity={0.8} />
            <RtmLabel x={128} y={midY(Y.l1)} label="Risk Stripe L1" />
            {l1Row.map(id => <RtmBox key={id} {...nodes[id]} />)}
          </g>

          {/* Phase 5 — Risk Stripe L2 */}
          <g style={rowStyle(5)}>
            <RtmLabel x={128} y={midY(Y.l2)} label="Risk Stripe L2" />
            {l2Row.map(id => <RtmBox key={id} {...nodes[id]} />)}
          </g>

          {/* Phase 7 — Risk Stripe L3 */}
          <g style={rowStyle(7)}>
            <RtmLabel x={128} y={midY(Y.l3)} label="Risk Stripe L3" />
            {l3Row.map(id => <RtmBox key={id} {...nodes[id]} />)}
          </g>

          {/* Phase 9 — Risk Measurement */}
          <g style={rowStyle(9)}>
            <RtmLabel x={128} y={midY(Y.meas, 36)} label="Risk Measurement" />
            {measRow.map(id => <RtmBox key={id} {...nodes[id]} />)}
          </g>

          {/* Phase 11 — Impact */}
          <g style={rowStyle(11)}>
            <RtmLabel x={128} y={midY(Y.imp)} label="Impact" />
            {impRow.map(id => <RtmBox key={id} {...nodes[id]} />)}
            <rect x={146} y={Y.lim} width={872} height={22} rx={4} fill="#2a1f10" stroke="#c8855a" strokeWidth={1} />
            <text x={582} y={Y.lim+11} textAnchor="middle" dominantBaseline="middle"
              fontSize={10} fontWeight="600" fill="#f0c880" fontFamily="inherit">Limit breaches</text>
          </g>

          {/* Phase 13 — Action */}
          <g style={rowStyle(13)}>
            <RtmLabel x={128} y={midY(Y.act)} label="Action" />
            <rect x={180} y={Y.act} width={720} height={NH} rx={5} fill="#2a1f10" stroke="#c8855a" strokeWidth={1.5} />

              fontSize={10.5} fontWeight="600" fill="#f0c880" fontFamily="inherit">
              Proposed actions: Lowering of limits, winding down trades,
            </text>
          </g>

        </svg>
      </div>
    </div>
  );
}

function CMEDashboard({ scenarioData, chartData, onBack, onGenerateBriefing, briefing, briefingType, generatingBriefing, showBriefing, setShowBriefing }) {

  useEffect(() => {
    if (!actionsMenuOpen) return;
    const handler = (e) => { if (actionsMenuRef.current && !actionsMenuRef.current.contains(e.target)) setActionsMenuOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [actionsMenuOpen]);

  const toggleStep   = (i) => setActiveStep(prev => prev === i ? null : i);
  const toggleAction = (tab, idx) => setExpandedAction(prev =>
    prev?.tab === tab && prev?.idx === idx ? null : { tab, idx }
  );
  const isExpanded   = (tab, idx) => expandAll || (expandedAction?.tab === tab && expandedAction?.idx === idx);

  const generateActionSummary = async () => {
    setSummaryLoading(true); setActionSummary(null);

      const res  = await fetch('/api/scenario/briefing', {

        body: JSON.stringify({ type: 'actions' })

      const data = await res.json();
      setActionSummary(data.briefing);

      setActionSummary('Failed to generate summary: ' + err.message);

      setSummaryLoading(false);

    'This is not a normal market event. It is an infrastructure event. Standard VaR, delta hedging, margin management, and pricing frameworks assume exchange availability. A CME closure creates pricing gaps, frozen margin, unhedged positions, liquidity stress, and regulatory escalation requiring immediate CRO leadership attention.';

function ScenarioPage() {
  const [selected,           setSelected]           = useState(null);
  const [transitioning,      setTransitioning]      = useState(false);
  const [scenarioData,       setScenarioData]       = useState(null);
  const [chartData,          setChartData]          = useState(null);
  const [loading,            setLoading]            = useState(true);
  const [showBriefing,       setShowBriefing]       = useState(false);
  const [briefingType,       setBriefingType]       = useState(null);
  const [briefing,           setBriefing]           = useState(null);
  const [generatingBriefing, setGeneratingBriefing] = useState(false);

  useEffect(() => {
    Promise.all([
      fetch('/api/scenario/data').then(r => r.json()).catch(() => ({ available:false })),
      fetch('/api/scenario/chart-data').then(r => r.json()).catch(() => ({ available:false }))
    ]).then(([doc, charts]) => {
      setScenarioData(doc);
      setChartData(charts);
      setLoading(false);
    });
  }, []);

  const handleSelect = async (id) => {
    setTransitioning(true);
    await minDelay(10000, 15000);
    setSelected(id);
    setTransitioning(false);
  };

  const generateBriefing = async (type) => {
    setBriefingType(type);
    setGeneratingBriefing(true);
    setShowBriefing(true);
    setBriefing(null);
    try {
      const [res] = await Promise.all([
        fetch('/api/scenario/briefing', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ type }) }),
        minDelay(8000, 20000)
      ]);
      const data = await res.json();
      setBriefing(data.briefing);
    } catch (err) {
      setBriefing('Failed to generate briefing: ' + err.message);
    } finally {
      setGeneratingBriefing(false);
    }
  };

  if (loading) return <div className="page"><div className="spinner-wrap"><div className="spinner"></div> Loading scenario data…</div></div>;

  if (transitioning) return (
    <div className="page">
      <ProcessingView
        title="Loading Scenario Dashboard"
        icon="fa-radiation"
        messages={[
          'Initialising stress scenario engine…',
          'Loading risk transmission model…',
          'Fetching quantification parameters…',
          'Building war-room dashboard…',
          'Resolving regulatory notification matrix…',
          'Preparing scenario intelligence data…',
        ]}
      />
    </div>
  );

  if (!selected) return <ScenarioLibrary onSelect={handleSelect} />;

  if (selected !== 4) {
    return (
      <div className="page">
        <button className="btn-outline" style={{marginBottom:20,fontSize:13}} onClick={() => setSelected(null)}>
          <i className="fa-solid fa-arrow-left"></i> Scenario Library
        </button>
        <div className="card" style={{textAlign:'center',padding:'64px 40px'}}>
          <div style={{fontSize:40,marginBottom:16,color:'var(--border)'}}>🚧</div>
          <div style={{fontSize:18,fontWeight:700,marginBottom:8}}>Detailed dashboard coming soon</div>
          <div style={{color:'var(--text-2)',fontSize:14}}>This scenario is currently in development. Please check back in a future release.</div>
        </div>
      </div>
    );
  }

  return (
    <CMEDashboard
      scenarioData={scenarioData}
      chartData={chartData}
      onBack={() => setSelected(null)}
      onGenerateBriefing={generateBriefing}
      briefing={briefing}
      briefingType={briefingType}
      generatingBriefing={generatingBriefing}
      showBriefing={showBriefing}
      setShowBriefing={setShowBriefing}
    />
  );
}

const SCATTER_COLORS = ['#FFAD28','#1E3A5F','#059669','#FFAD28','#7C3AED','#DB2777','#0284C7','#0F766E'];
const CLUSTER_BORDER_COLORS = ['#CC8A1E','#162D4A','#047857','#CC8A1E','#6D28D9','#BE185D','#0369A1','#0F5C55'];

function getPctKey(row) {
  return Object.keys(row).find(k => k.toLowerCase().includes('pct') && k.toLowerCase().includes('100')) || '';
}

function riskPillClass(r) {
  const s = String(r).toLowerCase();
  if (s.includes('critical')) return 'critical';
  if (s.includes('high'))     return 'high';
  if (s.includes('medium') || s.includes('med')) return 'medium';
  if (s.includes('low'))      return 'low';
  return '';
}

function statusPillClass(s) {
  const v = String(s).toLowerCase();
  if (v.includes('escal') || v.includes('mlro')) return 'escalated';
  if (v.includes('invest'))   return 'invest';
  if (v.includes('monitor'))  return 'monitor';
  return '';
}

function riskCardClass(s) {
  const v = String(s).toLowerCase();
  if (v.includes('high') || v.includes('critical')) return 'high';
  if (v.includes('medium')) return 'medium';
  return 'low';
}

function ScatterPlotChart({ data, xCol, yCol }) {
  const canvasRef = useRef(null);
  const chartRef  = useRef(null);

  const isCurrency = col => col && (col.toLowerCase().includes('gbp') || col.toLowerCase().includes('amount'));
  const formatVal  = (col, v) => isCurrency(col) ? `£${Number(v).toLocaleString()}` : Number(v).toLocaleString();

  useEffect(() => {
    if (!canvasRef.current) return;
    if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }
    if (!data || !data.length || !xCol || !yCol) return;

    const clusters = {};
    data.forEach(row => {
      const label = String(row['Cluster Label'] || row['Cluster'] || 'Unknown');
      if (!clusters[label]) clusters[label] = [];
      clusters[label].push(row);
    });

    const clusterList = Object.keys(clusters);

    const config = {
      type: 'scatter',
      data: {
        datasets: clusterList.map((label, idx) => ({
          label,
          data: clusters[label].map(r => {
            const pctKey = getPctKey(r);
            return {
              x: parseFloat(r[xCol]) || 0,
              y: parseFloat(r[yCol]) || 0,
              partyId:     r['Party ID'],
              riskRating:  r['Risk Rating'],
              crossBorder: r['Cross-Border TXN Count'],
              pctAbove:    pctKey ? r[pctKey] : null,
              distance:    r['Distance from Centroid'],
              flag:        r['Flag / Note'] || r['Flag  Note'] || ''
            };
          }),
          backgroundColor: SCATTER_COLORS[idx % SCATTER_COLORS.length] + 'BB',
          borderColor:     SCATTER_COLORS[idx % SCATTER_COLORS.length],
          pointRadius: 7, pointHoverRadius: 11, borderWidth: 1.5
        }))
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { position: 'top', labels: { font: { family: 'Inter', size: 12 }, padding: 14, color: '#E2E8F0' } },
          title: { display: false },
          tooltip: {
            callbacks: {
              title: items => items.length ? `Party: ${items[0].raw.partyId || 'N/A'}` : '',
              label: ctx => {
                const p = ctx.raw;
                const pct = p.pctAbove !== null && p.pctAbove !== undefined
                  ? (parseFloat(p.pctAbove) <= 1 ? (parseFloat(p.pctAbove)*100).toFixed(1)+'%' : parseFloat(p.pctAbove).toFixed(1)+'%')
                  : 'N/A';
                return [
                  `Cluster: ${ctx.dataset.label}`,
                  `Risk Rating: ${p.riskRating || 'N/A'}`,
                  `${xCol}: ${formatVal(xCol, p.x)}`,
                  `${yCol}: ${formatVal(yCol, p.y)}`,
                  `Cross-Border TXN: ${p.crossBorder ?? 'N/A'}`,
                  `>£100K: ${pct}`,
                  `Distance from Centroid: ${typeof p.distance === 'number' ? p.distance.toFixed(2) : (p.distance ?? 'N/A')}`,
                  ...(p.flag ? [`Flag: ${p.flag}`] : [])
                ];
              }
            },
            backgroundColor: 'rgba(15,23,42,0.93)',
            titleColor: '#fff', bodyColor: 'rgba(255,255,255,0.82)',
            padding: 12, cornerRadius: 8, displayColors: true
          }
        },
        scales: {
          x: {
            title: { display: true, text: xCol, font: { family: 'Inter', size: 12 }, color: '#94A3B8' },
            ticks: { callback: v => formatVal(xCol, v), font: { family: 'Inter', size: 11 }, color: '#94A3B8' },
            grid: { color: 'rgba(255,255,255,0.07)' }
          },
          y: {
            title: { display: true, text: yCol, font: { family: 'Inter', size: 12 }, color: '#94A3B8' },
            ticks: { callback: v => formatVal(yCol, v), font: { family: 'Inter', size: 11 }, color: '#94A3B8' },
            grid: { color: 'rgba(255,255,255,0.07)' }
          }
        }
      }
    };
    chartRef.current = new Chart(canvasRef.current.getContext('2d'), config);
    return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
  }, [JSON.stringify(data), xCol, yCol]);

  if (!data || !data.length || !xCol || !yCol) return <div style={{padding:30,color:'var(--text-3)',textAlign:'center'}}>No scatter data to display.</div>;
  return <div style={{position:'relative',height:420}}><canvas ref={canvasRef}></canvas></div>;
}

function buildAnomalyNarrative(a) {
  const riskRating   = String(a['Risk Rating'] || '');
  const clusterLabel = a['Cluster Label'] || a['Cluster'] || '';
  const anomalyType  = a['Anomaly Type'] || '';
  const distRaw      = parseFloat(a['Distance from Centroid']);
  const dist         = isNaN(distRaw) ? null : distRaw;
  const status       = a['Investigation Status'] || '';
  const topFeats     = a['Top Features'] || '';
  const amlNarrative = a['Notes / AML Narrative'] || a['Notes  AML Narrative'] || '';
  const isHighRisk   = /(high|critical)/i.test(riskRating);
  const isEscalated  = /(mlro|escal)/i.test(status);

  let behaviouralPattern;
  if (amlNarrative) {
    behaviouralPattern = amlNarrative;
  } else if (anomalyType && dist !== null) {
    const severity = dist > 5 ? 'materially elevated' : dist > 2 ? 'elevated' : 'moderate';
    behaviouralPattern = `Party exhibits ${severity} behavioural deviation from its cluster centroid (distance: ${dist.toFixed(2)}), consistent with ${anomalyType} typology indicators. Behaviour suggests deviation from expected activity profile within the ${clusterLabel || 'assigned'} cluster.`;
  } else {
    behaviouralPattern = 'Not available in source dataset.';
  }

  const keyDrivers = topFeats || 'Not available in source dataset.';

  let riskIndicatorParts = [];
  if (anomalyType) riskIndicatorParts.push(`Anomaly classification: ${anomalyType}`);
  if (dist !== null) {
    const level = dist > 5 ? 'high' : dist > 2 ? 'moderate' : 'low';
    riskIndicatorParts.push(`Centroid distance indicates ${level} behavioural deviation from cluster norm`);
  }
  if (isHighRisk) riskIndicatorParts.push(`${riskRating} risk rating indicates elevated monitoring attention`);
  if (clusterLabel) riskIndicatorParts.push(`Cluster assignment: ${clusterLabel}`);
  const riskIndicators = riskIndicatorParts.length
    ? riskIndicatorParts.join('. ') + '. Pattern may warrant further investigation against customer profile, expected activity documentation, and supporting transaction evidence.'
    : 'Not available in source dataset.';

  let reviewFocus;
  if (isEscalated) {
    reviewFocus = 'Case is currently escalated. Validate all supporting documentation, transaction purpose, counterparty relationships, and source of funds evidence before determining next action or regulatory notification requirement.';
  } else if (isHighRisk) {
    reviewFocus = 'Enhanced due diligence review is indicated given the High risk rating. Validate transaction purpose, counterparty profile, source of funds, and any linked trade documentation. Consider whether escalation thresholds have been met.';
  } else {
    reviewFocus = 'Review transaction patterns against customer profile and expected activity thresholds. Confirm monitoring disposition and validate supporting evidence before case closure or status update.';
  }

  return { behaviouralPattern, keyDrivers, riskIndicators, investigationStatus: status || 'Not available in source dataset.', reviewFocus };
}

function parseInsightsSections(text) {
  if (!text) return [];
  const lines = text.split('\n');
  const sections = [];
  let cur = null;
  for (const line of lines) {
    const m = line.match(/^(\d+)\.\s+([^:]+):\s*(.*)/);
    if (m) {
      if (cur) sections.push(cur);
      cur = { num: m[1], label: m[2].trim(), content: m[3].trim() };
    } else if (cur && line.trim()) {
      cur.content += (cur.content ? ' ' : '') + line.trim();
    }
  }
  if (cur) sections.push(cur);
  return sections;
}

function classifClass(c) {
  if (!c) return '';
  const v = c.toLowerCase();
  if (v.includes('confidential')) return 'classif-confidential';
  if (v.includes('restrict'))     return 'classif-restricted';
  if (v.includes('internal'))     return 'classif-internal';
  if (v.includes('public'))       return 'classif-public';
  return '';
}
function statusClass(s) {
  if (!s) return '';
  const v = s.toLowerCase();
  if (v.includes('active') || v.includes('live')) return 'status-active';
  if (v.includes('review') || v.includes('draft')) return 'status-review';
  return '';
}

function parseSummaryText(text) {
  if (!text) return [];
  const sections = [];
  let cur = null;
  for (const line of text.split('\n')) {
    // Match **Label [TAG]:**, **Label [TAG]**, or **Label:**
    const m = line.match(/^\*\*([^*\[\]]+?)(?:\s*\[(EXTRACTED|INFERRED)\])?\s*:?\*\*\s*(.*)/i);
    if (m) {
      if (cur) sections.push(cur);
      cur = {
        label:      m[1].replace(/:$/, '').trim(),
        confidence: m[2] ? m[2].toUpperCase() : null,
        content:    m[3].trim()
      };
    } else if (cur && line.trim()) {
      cur.content += (cur.content ? '\n' : '') + line.trim();
    }
  }
  if (cur) sections.push(cur);
  return sections;
}

function VaultPage() {
  const [activeTab,      setActiveTab]     = useState('risk');
  const [docs,           setDocs]          = useState(null);
  const [loading,        setLoading]       = useState(true);
  const [error,          setError]         = useState(null);
  const [selectedDoc,    setSelectedDoc]   = useState(null);
  const [summary,        setSummary]       = useState(null);
  const [summaryLoading, setSummaryLoading]= useState(false);
  const [summarySource,  setSummarySource] = useState('');
  const [search,         setSearch]        = useState('');

  useEffect(() => {
    fetch('/api/vault/documents')
      .then(r => r.json())
      .then(d => { if (d.available) setDocs(d.documents); else setError(d.message); setLoading(false); })
      .catch(() => { setError('Failed to connect to server.'); setLoading(false); });
  }, []);

  const generateSummary = async (doc) => {
    setSelectedDoc(doc); setSummary(null); setSummaryLoading(true);
    try {
      const res = await fetch('/api/vault/summary', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ section: doc.section, index: doc.index })
      });
      const data = await res.json();
      setSummary(data.summary || 'No summary generated.');
      setSummarySource(data.source || '');
    } catch { setSummary('Failed to generate summary. Please try again.'); }
    setSummaryLoading(false);
  };

  const closePanel = () => { setSelectedDoc(null); setSummary(null); };

  const totalDocs = docs
    ? Object.values(docs).reduce((s, arr) => s + (arr?.length || 0), 0)
    : 0;

  if (loading) return (
    <div className="page">
      <div className="page-header"><div className="page-title">Risk Sensing & Policy Intelligence</div></div>
      <div className="spinner-wrap"><div className="spinner"></div><span>Loading knowledge vault…</span></div>
    </div>
  );

  return (
    <div className="page" style={{maxWidth:1300}}>
      <div className="page-header">
        <div className="page-title">Risk Sensing & Policy Intelligence</div>
        <div className="page-sub">Internal knowledge base Risk, Regulatory, and Email intelligence documents. Summaries generated on-demand from source documents only.</div>
      </div>

      {error ? (
        <div className="alert alert-info" style={{maxWidth:600}}>
          <i className="fa-solid fa-folder-open alert-icon"></i>
          <div>
            <div style={{fontWeight:600,marginBottom:4}}>Vault data not loaded</div>
            <div>{error}</div>
            <div style={{marginTop:8,fontSize:12,color:'var(--text-3)'}}>
              Place <strong>Vault+Report_Page_Data.docx</strong> in the <code>data/vault/</code> folder, then restart the server.
            </div>
          </div>
        </div>
      ) : (
        <>
          {/* Tabs */}
          <div className="vault-tabs">
            {VAULT_TABS.map(t => {
              const isDocTab = VAULT_DOC_TABS.has(t.key);
              const count = isDocTab ? (docs?.[t.key]?.length || 0) : null;
              return (
                <button key={t.key} className={`vault-tab${activeTab === t.key ? ' active' : ''}`}
                  onClick={() => { setActiveTab(t.key); setSearch(''); }}>
                  <i className={`fa-solid ${t.icon}`}></i>
                  {t.label}
                  {count != null && <span className="vault-tab-count">{count}</span>}
                </button>
              );
            })}
          </div>

          {/* Search — only for document tabs */}
          {VAULT_DOC_TABS.has(activeTab) && (
            <div className="vault-search">
              <input className="input-box" style={{maxWidth:320,fontSize:13,padding:'8px 12px'}}
                placeholder={`Search ${VAULT_TABS.find(t=>t.key===activeTab)?.label}…`}
                value={search} onChange={e => setSearch(e.target.value)} />
              {search && (
                <button onClick={() => setSearch('')} style={{background:'none',border:'none',cursor:'pointer',color:'var(--text-3)',fontSize:14}}>
                  <i className="fa-solid fa-xmark"></i>
                </button>
              )}
            </div>
          )}

          {/* Tab content */}
          {activeTab === 'insights' ? (
            <InsightsDataTab />
          ) : activeTab === 'report' ? (
            <ReportGeneratorTab />
          ) : (
            <div className="vault-layout">
              <div>
                {(() => {
                  const tabDocs = (docs?.[activeTab] || []).filter(d =>
                    !search || d.title.toLowerCase().includes(search.toLowerCase()) ||
                    d.preview.toLowerCase().includes(search.toLowerCase())
                  );
                  if (!tabDocs.length) {
                    return (
                      <div className="vault-empty-state">
                        <div className="vault-empty-icon"><i className="fa-solid fa-folder-open"></i></div>
                        <div className="vault-empty-title">{search ? 'No results found' : 'No documents in this section'}</div>

                      </div>

                  }
                  return (
                    <div className="vault-grid">
                      {tabDocs.map((doc, i) => (
                        <VaultDocCard key={i} doc={doc}
                          selected={false}
                          onGenerate={generateSummary} />
                      ))}
                    </div>
                  );
                })()}
              </div>
            </div>
          )}

          {/* Summary child window (modal overlay) */}
          {selectedDoc && (
            <VaultSummaryPanel
              doc={selectedDoc} summary={summary}
              loading={summaryLoading} source={summarySource}
              onClose={closePanel} />
          )}
        </>
      )}
    </div>
  );
}

function ReportChart({ chartData, chartType, title, metrics }) {
  const canvasRef = React.useRef(null);
  React.useEffect(() => {
    if (!canvasRef.current || !chartData) return;
    if (canvasRef.current._chartInst) canvasRef.current._chartInst.destroy();
    const isHBar = chartType === 'horizontalBar';
    const isDoughnut = chartType === 'doughnut';
    const colors = ['#3b82f6','#ef4444','#10b981','#f59e0b','#8b5cf6','#06b6d4','#ec4899','#14b8a6','#f97316','#84cc16'];
    canvasRef.current._chartInst = new Chart(canvasRef.current, {
      type: isDoughnut ? 'doughnut' : 'bar',
      data: {
        labels: chartData.labels,
        datasets: [{
          label: title,
          data: chartData.values,
          backgroundColor: isDoughnut ? colors.slice(0, chartData.labels.length) : '#3b82f6',
          borderColor: isDoughnut ? '#fff' : '#3b82f6',
          borderWidth: isDoughnut ? 2 : 0,
          borderRadius: isDoughnut ? 0 : 4,
        }]
      },
      plugins: [{
        id: 'snapshotForPrint',
        afterRender: function(chart) {
          try {
            var cv2 = chart.canvas;
            var w2 = cv2.width || 700;
            var h2 = cv2.height || 280;
            var off2 = document.createElement('canvas');
            off2.width = w2; off2.height = h2;
            var c2 = off2.getContext('2d');
            c2.fillStyle = '#ffffff';
            c2.fillRect(0, 0, w2, h2);
            c2.drawImage(cv2, 0, 0);
            cv2._printDataUrl = off2.toDataURL('image/png');
          } catch(snapErr) {}
        }
      }],
      options: {
        indexAxis: isHBar ? 'y' : 'x',
        responsive: true, maintainAspectRatio: false,
        animation: { duration: 400 },
        plugins: {
          legend: { display: isDoughnut, position: 'bottom', labels: { boxWidth: 12, font: { size: 11 }, color: '#E2E8F0' } },
          tooltip: { callbacks: { label: ctx => { const v = ctx.parsed[isHBar ? 'x' : 'y']; return (title.includes('Volume') || title.includes('Exposure')) ? ` £${Number(v).toLocaleString()}` : ` ${Number(v).toLocaleString()}`; } } }
        },
        scales: isDoughnut ? {} : {
          x: { grid: { color: 'rgba(255,255,255,0.07)' }, ticks: { font: { size: 10.5 }, color: '#94A3B8' } },
          y: { grid: { color: 'rgba(255,255,255,0.07)' }, ticks: { font: { size: 10.5 }, color: '#94A3B8' } }
        }
      }
    });
    return () => { if (canvasRef.current?._chartInst) canvasRef.current._chartInst.destroy(); };
  }, []);
  return (
    <div className="report-chart-card">
      <div className="report-chart-title">{title}</div>
      {metrics && (
        <div className="report-chart-kpis">
          {Object.entries(metrics).map(([k,v]) => (
            <div key={k} className="report-chart-kpi"><strong>{k}:</strong> {v}</div>
          ))}
        </div>
      )}
      <div style={{position:'relative', height: chartType === 'doughnut' ? 200 : 210}}>
        <canvas ref={canvasRef}></canvas>
      </div>
    </div>
  );
}

function EmailPreviewWindow({ emailText, onClose }) {

    if (line.trim().startsWith('•')) return <div key={i} className="email-body-line-bullet">{line}</div>;

    return <div key={i} className="email-body-line-text">{line}</div>;

          <div style={{fontSize:10.5,fontWeight:700,textTransform:'uppercase',letterSpacing:0.5,color:'var(--text-3)',marginBottom:3}}>Subject</div>
          <div style={{fontSize:14,fontWeight:700,color:'var(--text)'}}>{subject}</div>
        </div>
        <div className="vault-summary-body">
          {emailText.split('\n').map((line, i) => formatLine(line, i))}
        </div>
        <div className="vault-summary-footer">
          <span className="vault-summary-footer-left"><i className="fa-solid fa-robot"></i>Generated by Groq AI · llama-3.1-8b-instant</span>
