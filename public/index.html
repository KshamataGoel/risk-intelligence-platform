          data: data.values,
          backgroundColor: bgColors,
          hoverBackgroundColor: hvrColors,
          borderRadius: 4,
          borderSkipped: false
        }]
      },
      options: {
        ...baseOpts,
        indexAxis: 'y',
        plugins: {
          ...baseOpts.plugins,
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => {
                const val = ctx.raw;
                const suffix = ctx.dataIndex === hlIdx ? (isMin ? '  ★ Lowest' : '  ★ Highest') : '';
                return isGBP ? `  £${val.toLocaleString()}${suffix}` : `  ${val.toLocaleString()}${suffix}`;
              }
            }
          }
        },
        scales: {
          x: {
            grid: { color: 'rgba(0,0,0,0.05)' },
            ticks: { font: { family: 'Inter', size: 12 }, callback: v => isGBP ? `£${Number(v).toLocaleString()}` : Number(v).toLocaleString() },
            beginAtZero: true
          },
          y: { grid: { display: false }, ticks: { font: { family: 'Inter', size: 12 } } }
        }
      }
    };
  }

  if (type === 'line') {
    return {
      type: 'line',
      data: {
        labels: data.labels,
        datasets: [{
          label: 'Transaction Volume',
          data: data.values,
          borderColor: '#8B1C1C',
          backgroundColor: 'rgba(139,28,28,0.08)',
          borderWidth: 2.5,
          fill: true,
          tension: 0.4,
          pointBackgroundColor: '#8B1C1C',
          pointRadius: 5,
          pointHoverRadius: 7
        }]
      },
      options: {
        ...baseOpts,
        plugins: {
          ...baseOpts.plugins,
          tooltip: { callbacks: { label: ctx => `  £${ctx.raw.toLocaleString()}` } }
        },
        scales: {
          x: { grid: { display: false }, ticks: { font: { family: 'Inter', size: 12 } } },
          y: {
            grid: { color: 'rgba(0,0,0,0.05)' },
            ticks: { font: { family: 'Inter', size: 12 }, callback: v => `£${Number(v).toLocaleString()}` },
            beginAtZero: true
          }
        }
      }
    };
  }

  return null;
}

// ── Components ───────────────────────────────────────────────────────────────

function ChartComponent({ type, data, title, highlightIndex, highlightType }) {
  const canvasRef = useRef(null);
  const chartRef  = useRef(null);

  useEffect(() => {
    if (!canvasRef.current || !data) return;
    if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }

    const cfg = buildChartConfig(type, data, title, highlightIndex, highlightType);
    if (!cfg) return;
    chartRef.current = new Chart(canvasRef.current.getContext('2d'), cfg);
    return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
  }, [type, title, JSON.stringify(data), highlightIndex, highlightType]);

  return (
    <div className="chart-container">
      <canvas ref={canvasRef}></canvas>
    </div>
  );
}

function MetricsRow({ metrics }) {
  if (!metrics) return null;
  const entries = Object.entries(metrics);
  return (
    <div className="metrics-row">
      {entries.map(([k, v]) => (
        <div key={k} className="metric-card">
          <div className="metric-label">{k}</div>
          <div className="metric-value">{typeof v === 'number' ? v.toLocaleString() : v}</div>
        </div>
      ))}
    </div>
  );
}

function DataTable({ columns, preview }) {
  if (!preview || !preview.length) return null;
  return (
    <div className="table-wrap">
      <table>
        <thead>
          <tr>{columns.map(c => <th key={c}>{c.replace(/_/g, ' ')}</th>)}</tr>
        </thead>
        <tbody>
          {preview.map((row, i) => (
            <tr key={i}>
              {columns.map(c => (
                <td key={c} title={row[c] !== null && row[c] !== undefined ? String(row[c]) : ''}>
                  {row[c] !== null && row[c] !== undefined ? String(row[c]) : '—'}
                </td>
              ))}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

// ── Processing helpers ────────────────────────────────────────────────────────
function minDelay(minMs, maxMs) {
  const ms = minMs + Math.random() * (maxMs - minMs);
  return new Promise(resolve => setTimeout(resolve, ms));
}

function ProcessingView({ title, messages, icon }) {
  const [msgIdx,   setMsgIdx]   = useState(0);
  const [fade,     setFade]     = useState(true);

  useEffect(() => {
  }, []);

  useEffect(() => {
    const cycle = () => {
      const delay = 3200 + Math.random() * 1600;
      return setTimeout(() => {
        setFade(false);
        setTimeout(() => {
          setMsgIdx(i => (i + 1) % messages.length);
          setFade(true);
          cycleRef.current = cycle();
        }, 400);
      }, delay);
    };
    const cycleRef = { current: cycle() };
    return () => clearTimeout(cycleRef.current);
  }, []);

  return (
    <div className="processing-view">
      <div className="processing-icon-ring">
        <i className={`fa-solid ${icon || 'fa-microchip-ai'}`}></i>
      </div>
      <div className="processing-title">{title || 'Processing…'}</div>
      <div className="processing-msg" style={{opacity: fade ? 1 : 0}}>{messages[msgIdx]}</div>
      <div className="processing-bar-wrap"><div className="processing-bar"></div></div>
    </div>
  );
}

const SECTION_ICONS = { A: 'fa-bullseye', B: 'fa-magnifying-glass-chart', C: 'fa-shield-halved', D: 'fa-gears', E: 'fa-chart-line', F: 'fa-database' };
const SECTION_COLORS = { A: 'section-blue', B: 'section-blue', C: 'section-orange', D: 'section-purple', E: 'section-teal', F: 'section-gray' };

function SummaryView({ text }) {
  if (!text) return null;
  const sectionRegex = /^([A-F])\.\s*([^:\n]+):\s*(.+)$/gm;
  const sections = [];
  let match;
  while ((match = sectionRegex.exec(text)) !== null) {
    sections.push({ key: match[1], label: match[2].trim(), content: match[3].trim() });
  }
  if (sections.length >= 3) {
    return (
      <div className="summary-sections">
        {sections.map(s => (
          <div key={s.key} className={`summary-section ${SECTION_COLORS[s.key] || ''}`}>
            <div className="summary-section-label">
              <i className={`fa-solid ${SECTION_ICONS[s.key] || 'fa-circle'}`}></i>
              <span>{s.key}. {s.label}</span>
            </div>
            <div className="summary-section-content">{s.content}</div>
          </div>
        ))}
      </div>
    );
  }
  return <div className="summary-text">{text}</div>;
}

function InsightsPage() {
  const [question,    setQuestion]    = useState('');
  const [loading,     setLoading]     = useState(false);
  const [result,      setResult]      = useState(null);
  const [error,       setError]       = useState(null);
  const [catalogue,   setCatalogue]   = useState([]);
  const [showPreview, setShowPreview] = useState(false);

  useEffect(() => {
    fetch('/api/catalogue')
      .then(r => r.json())
      .then(d => setCatalogue(d.datasets || []))
      .catch(() => {});
  }, []);

  const ask = useCallback(async (q) => {
    const text = (q || question).trim();
    if (!text) return;
    setLoading(true); setResult(null); setError(null); setShowPreview(false);
    try {
      const [res] = await Promise.all([
        fetch('/api/insights', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ question: text }) }),
        minDelay(8000, 15000)
      ]);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Server error');
      setResult(data);
    } catch (err) {
      setError(err.message || 'Failed to connect to server.');
    } finally {
      setLoading(false);
    }
  }, [question]);

  const handleSuggested = (text) => { setQuestion(text); ask(text); };

  const handleKey = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); ask(); } };

  return (
    <div className="page">
      {/* Header */}
      <div className="page-header">
        <div className="page-title">Intelligence Centre</div>
        <div className="page-sub">
          Ask questions across approved Risk &amp; Compliance datasets.
          
        </div>
      </div>


      {/* Suggested questions */}
      <div className="questions-grid">
        {SUGGESTED.map((s, i) => (
          <button key={i} className="q-card" onClick={() => handleSuggested(s.text)}>
            <div className="q-card-icon"><i className={`fa-solid ${s.icon}`}></i></div>
            <div>
              <div className="q-card-text">{s.text}</div>
              <div className="q-card-badge">{s.tag}</div>
            </div>
          </button>
        ))}
      </div>

      {/* Input */}
      <div className="input-row">
        <input
          className="input-box"
          type="text"
          placeholder="Ask a question about your risk data…"
          value={question}
          onChange={e => setQuestion(e.target.value)}
          onKeyDown={handleKey}
        />
        <button className="btn-primary" onClick={() => ask()} disabled={loading || !question.trim()}>
          {loading
            ? <><div className="spinner" style={{width:16,height:16,borderWidth:2}}></div> Analysing…</>
            : <><i className="fa-solid fa-paper-plane"></i> Ask</>}
        </button>
      </div>

      {/* Loading */}
      {loading && (
        <ProcessingView
          title="Analysing Intelligence Data"
          icon="fa-chart-bar"
          messages={[
            'Scanning dataset dimensions…',
            'Executing semantic query layer…',
            'Resolving risk data entities…',
            'Aggregating cross-dataset signals…',
            'Applying analytical filters…',
            'Constructing insight response…',
            'Validating output against schema…',
          ]}
        />
      )}

      {/* Error */}
      {error && (
        <div className="alert alert-error">
          <i className="fa-solid fa-circle-exclamation alert-icon"></i>
          {error}
        </div>
      )}

      {/* Not found */}
      {result && !result.answer_available && (
        <div className="alert alert-info">
          <i className="fa-solid fa-triangle-exclamation alert-icon"></i>
          {result.message}
        </div>
      )}

      {/* Results */}
      {result && result.answer_available && (
        <div>
          {/* Concentration / Trend Alert Banner */}
          {result.concentration_insight && (
            <div className="concentration-banner">
              <i className="fa-solid fa-triangle-exclamation"></i>
              {result.concentration_insight}
            </div>
          )}

          {/* Structured Intelligence Brief */}
          <div className="summary-card">
            <div className="summary-header">
              <i className="fa-solid fa-brain summary-icon"></i>
              <span className="summary-label">Intelligence Brief</span>
            </div>
            <SummaryView text={result.summary} />
          </div>

          {/* Metrics */}
          <MetricsRow metrics={result.key_metrics} />

          {/* Chart */}
          <div className="card chart-card">
            <div className="card-header">
              <span className="card-title">{result.title}</span>
              <span className="ds-chip">
                <i className="fa-solid fa-table"></i>
                {result.dataset_used.replace(/_/g, ' ')}
              </span>
            </div>
            <ChartComponent
              type={result.chart_type}
              data={result.chart_data}
              title=""
              highlightIndex={result.highlight_index}
              highlightType={result.highlight_type}
            />
          </div>

          {/* Data Quality Note */}
          {result.quality_note && (
            <div className="quality-note">
              <i className="fa-solid fa-circle-info"></i>
              {result.quality_note}
            </div>
          )}

          {/* Source + preview */}
          <div className="info-row">
            <span><i className="fa-solid fa-database"></i> Dataset: <strong>{result.dataset_used.replace(/_/g, ' ')}</strong></span>
            <span><i className="fa-solid fa-lock"></i> Source: Approved Excel datasets only — no external data used</span>
          </div>

          {/* Preview toggle */}
          <button className="preview-toggle" onClick={() => setShowPreview(p => !p)}>
            <i className={`fa-solid fa-chevron-${showPreview ? 'up' : 'down'}`}></i>
            {showPreview ? 'Hide' : 'Show'} data preview (first 10 rows)
          </button>
          {showPreview && <DataTable columns={result.columns} preview={result.preview} />}

          {/* Follow-up suggestions */}
          {FOLLOWUPS[result.dataset_used] && (
            <div className="followup-section">
              <div className="followup-label">Suggested follow-up questions</div>
              <div className="followup-list">
                {FOLLOWUPS[result.dataset_used].map((q, i) => (
                  <button key={i} className="followup-btn" onClick={() => handleSuggested(q)}>{q}</button>
                ))}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── Scenario Chart helper ─────────────────────────────────────────────────────
function buildScenarioChartCfg(chartInfo, opts = {}) {
  if (!chartInfo || !chartInfo.available || !chartInfo.chart_data) return null;
  const { type, chart_data, multi } = chartInfo;
  const { xLabel, yLabel, enableZoom } = opts;

  const PALETTE = ['#8B1C1C','#1E3A5F','#059669','#D97706','#7C3AED','#DB2777','#0284C7'];

  const axisTitle = (label) => label ? { display:true, text:label, color:'#64748B', font:{family:'Inter',size:11,weight:'500'} } : {};

  const zoomCfg = enableZoom ? {
    zoom: { zoom:{ wheel:{enabled:true}, pinch:{enabled:true}, mode:'xy' }, pan:{enabled:true,mode:'xy'} }
  } : {};

  const baseOpts = {
    responsive:true, maintainAspectRatio:false,
    plugins:{
      legend:{ position:'bottom', labels:{ font:{family:'Inter',size:11}, padding:12, boxWidth:12 } },
      title:{ display:false },
      tooltip:{ callbacks:{ label: ctx => ` ${ctx.dataset.label || ''}: ${ctx.formattedValue}` } },
      zoom: enableZoom ? zoomCfg.zoom : undefined
    }
  };

  const scaleFont = { family:'Inter', size:11 };

  if (multi) {
    const datasets = chart_data.datasets.map((ds, i) => ({
      label: ds.label,
      data:  ds.values,
      backgroundColor: PALETTE[i % PALETTE.length] + 'CC',
      borderColor:     PALETTE[i % PALETTE.length],
      borderWidth: 1,
      borderRadius: 3
    }));
    return {
      type: 'bar',
      data: { labels: chart_data.labels, datasets },
      options: {
        ...baseOpts,
        indexAxis: type === 'horizontalBar' ? 'y' : 'x',
        scales:{
          x:{ stacked:false, grid:{color:'rgba(0,0,0,0.05)'}, ticks:{font:scaleFont}, title:{ display:!!xLabel, text:xLabel||'', color:'#64748B', font:{...scaleFont,weight:'500'} } },
          y:{ stacked:false, grid:{color:'rgba(0,0,0,0.05)'}, ticks:{font:scaleFont}, beginAtZero:true, title:{ display:!!yLabel, text:yLabel||'', color:'#64748B', font:{...scaleFont,weight:'500'} } }
        }
      }
    };
  }

  return {
    type: type === 'horizontalBar' ? 'bar' : (type === 'line' ? 'line' : 'bar'),
    data:{
      labels: chart_data.labels,
      datasets:[{
        label: chartInfo.title || '',
        data: chart_data.values,
        backgroundColor: type === 'line' ? 'rgba(139,28,28,0.1)' : PALETTE.map((c,i) => i===0?'#8B1C1C':c+'99'),
        borderColor: '#8B1C1C',
        borderWidth: type === 'line' ? 2.5 : 0,
        fill: type === 'line',
        tension: type === 'line' ? 0.4 : 0,
        pointBackgroundColor: '#8B1C1C',
        pointRadius: type === 'line' ? 4 : 0,
        borderRadius: type === 'line' ? 0 : 4
      }]
    },
    options:{
      ...baseOpts,
      indexAxis: type === 'horizontalBar' ? 'y' : 'x',
      plugins:{...baseOpts.plugins, legend:{display:false}},
      scales:{
        x:{ grid:{color:'rgba(0,0,0,0.05)'}, ticks:{font:scaleFont}, title:{ display:!!xLabel, text:xLabel||'', color:'#64748B', font:{...scaleFont,weight:'500'} } },
        y:{ grid:{color:'rgba(0,0,0,0.05)'}, ticks:{font:scaleFont}, beginAtZero:true, title:{ display:!!yLabel, text:yLabel||'', color:'#64748B', font:{...scaleFont,weight:'500'} } }
      }
    }
  };
}

function ScenarioChart({ chartInfo, opts }) {
  const canvasRef = useRef(null);
  const chartRef  = useRef(null);
  useEffect(() => {
    if (!canvasRef.current) return;
    if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }
    const cfg = buildScenarioChartCfg(chartInfo, opts || {});
    if (!cfg) return;
    chartRef.current = new Chart(canvasRef.current.getContext('2d'), cfg);
    return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
  }, [JSON.stringify(chartInfo), JSON.stringify(opts)]);

  if (!chartInfo || !chartInfo.available) {
    return <div className="scenario-chart-unavail"><i className="fa-solid fa-circle-info" style={{marginRight:6}}></i>Chart data not available in uploaded Excel file.</div>;
  }
  return <div style={{position:'relative',height:'100%'}}><canvas ref={canvasRef}></canvas></div>;
}

// ── Chart Expand Modal ────────────────────────────────────────────────────────
function ChartExpandModal({ sheetKey, chartInfo, onClose }) {
  const meta = CHART_META[sheetKey] || {};
  const chartRef = useRef(null);
  const title = chartInfo?.title || sheetKey.replace(/_/g,' ');

  const handleZoom = (dir) => {
    if (!chartRef.current) return;
    const chart = chartRef.current;
    if (dir === 'in')    chart.zoom(1.2);
    else if (dir === 'out') chart.zoom(0.8);
    else chart.resetZoom();
  };

  const handleExport = () => {
    if (!chartRef.current) return;
    const url = chartRef.current.toBase64Image();
    const a = document.createElement('a');
    a.href = url;
    a.download = `${title.replace(/\s+/g,'_')}.png`;
    a.click();
  };

  useEffect(() => {
    const handler = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', handler);
    return () => document.removeEventListener('keydown', handler);
  }, []);

  return (
    <div className="chart-modal-overlay" onClick={onClose}>
      <div className="chart-modal" onClick={e => e.stopPropagation()}>
        <div className="chart-modal-hdr">
          <div className="chart-modal-hdr-text">
            <div className="chart-modal-title">{title}</div>
            {meta.description && <div className="chart-modal-desc">{meta.description}</div>}
          </div>
          <div className="chart-modal-controls">
            <button className="chart-zoom-btn" onClick={() => handleZoom('in')} title="Zoom in"><i className="fa-solid fa-magnifying-glass-plus"></i></button>
            <button className="chart-zoom-btn" onClick={() => handleZoom('out')} title="Zoom out"><i className="fa-solid fa-magnifying-glass-minus"></i></button>
            <button className="chart-zoom-btn" onClick={() => handleZoom('reset')} title="Reset zoom" style={{fontSize:11}}>Reset</button>
            <button className="chart-zoom-btn" onClick={handleExport} title="Export as PNG"><i className="fa-solid fa-download"></i></button>
            <button className="chart-icon-btn" onClick={onClose} title="Close" style={{marginLeft:4,fontSize:16}}><i className="fa-solid fa-xmark"></i></button>
          </div>
        </div>
        <div className="chart-modal-body" style={{height:480}}>
          <ChartModalCanvas chartInfo={chartInfo} meta={meta} chartRef={chartRef} />
        </div>
      </div>
    </div>
  );
}

function ChartModalCanvas({ chartInfo, meta, chartRef }) {
  const canvasRef = useRef(null);
  const instanceRef = useRef(null);
  useEffect(() => {
    if (!canvasRef.current) return;
    if (instanceRef.current) { instanceRef.current.destroy(); instanceRef.current = null; }
    const cfg = buildScenarioChartCfg(chartInfo, { xLabel: meta.xLabel, yLabel: meta.yLabel, enableZoom: true });
    if (!cfg) return;
    instanceRef.current = new Chart(canvasRef.current.getContext('2d'), cfg);
    chartRef.current = instanceRef.current;
    return () => { if (instanceRef.current) { instanceRef.current.destroy(); instanceRef.current = null; } };
  }, [JSON.stringify(chartInfo)]);
  return <div style={{position:'relative',height:'100%'}}><canvas ref={canvasRef}></canvas></div>;
}

function HeatmapTable({ chartInfo }) {
  if (!chartInfo || !chartInfo.available || !chartInfo.rows || !chartInfo.rows.length) {
    return <div className="scenario-chart-unavail"><i className="fa-solid fa-circle-info" style={{marginRight:6}}></i>Chart data not available in uploaded Excel file.</div>;
  }
  const { rows, columns } = chartInfo;
  const labelCol  = columns[0];
  const dayCols   = columns.slice(1);

  const sevClass = (val) => {
    if (val === null || val === undefined || val === '') return '';
    const s = String(val).toLowerCase();
    if (s === 'critical' || s === '4' || (typeof val === 'number' && val >= 4)) return 'hm-critical';
    if (s === 'breach' || s === 'high' || s === '3' || (typeof val === 'number' && val >= 3)) return 'hm-high';
    if (s === 'elevated' || s === 'medium' || s === '2' || (typeof val === 'number' && val >= 2)) return 'hm-elevated';
    return 'hm-normal';
  };

  return (
    <div className="heatmap-wrap">
      <table className="heatmap-table">
        <thead>
          <tr>
            <th>{labelCol}</th>
            {dayCols.map(c => <th key={c}>{c}</th>)}
          </tr>
        </thead>
        <tbody>
          {rows.map((row, i) => (
            <tr key={i}>
              <td>{String(row[labelCol] ?? '')}</td>
              {dayCols.map(c => <td key={c} className={sevClass(row[c])}>{row[c] !== null && row[c] !== undefined ? String(row[c]) : '—'}</td>)}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

    <div className="briefing-overlay" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="briefing-modal">
        <div className="briefing-modal-header">
          <div className="briefing-modal-title">
            <i className="fa-solid fa-file-lines" style={{marginRight:8,color:'var(--primary)'}}></i>
            {BRIEFING_LABELS[type] || 'Briefing'}
          </div>
          <button className="briefing-modal-close" onClick={onClose}><i className="fa-solid fa-xmark"></i></button>
        </div>
        {generating
          ? <div style={{padding:'8px 16px'}}><ProcessingView
              title={`Generating ${BRIEFING_LABELS[type] || 'Briefing'}`}
              icon="fa-radiation"
              messages={[
                'Parsing scenario event parameters…',
                'Running stress transmission analysis…',
                'Evaluating risk stripe exposures…',
                'Synthesising management action priorities…',
                'Cross-referencing regulatory thresholds…',
                'Structuring executive narrative…',
                'Finalising briefing document…',
              ]}
            /></div>
          : <div className="briefing-content">{briefing}</div>}
        {!generating && briefing && (
          <div className="briefing-actions">
            <button className="btn-primary" style={{fontSize:13}} onClick={download}><i className="fa-solid fa-download"></i> Download</button>
            <button className="btn-outline" style={{fontSize:13}} onClick={copy}><i className="fa-regular fa-copy"></i> Copy</button>
            <button className="btn-outline" style={{fontSize:13}} onClick={window.print}><i className="fa-solid fa-print"></i> Print</button>
          </div>
        )}
        <div style={{marginTop:16,fontSize:11,color:'var(--text-3)'}}>
          Source: Scenario_Analysis_Module.docx — Generated for internal CRO / Board restricted use.
        </div>
      </div>
    </div>
  );
}

    <div className="flow-popover">

function CMEDashboard({ scenarioData, chartData, onBack, onGenerateBriefing, briefing, briefingType, generatingBriefing, showBriefing, setShowBriefing }) {
  const [actionTab,        setActionTab]        = useState('immediate');
  const [expandedAction,   setExpandedAction]   = useState(null);
  const [activeStep,       setActiveStep]       = useState(null);
  const [drawerStep,       setDrawerStep]       = useState(null);
  const [actionSummary,    setActionSummary]    = useState(null);
  const [summaryLoading,   setSummaryLoading]   = useState(false);
  const [expandAll,        setExpandAll]        = useState(false);
  const [openQuant,        setOpenQuant]        = useState(null);
  const [actionsMenuOpen,  setActionsMenuOpen]  = useState(false);
  const [expandedChart,    setExpandedChart]    = useState(null);
  const actionsMenuRef = React.useRef(null);

  useEffect(() => {
    if (!actionsMenuOpen) return;
    const handler = (e) => { if (actionsMenuRef.current && !actionsMenuRef.current.contains(e.target)) setActionsMenuOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [actionsMenuOpen]);

  const toggleStep   = (i) => setActiveStep(prev => prev === i ? null : i);
  const toggleAction = (tab, idx) => setExpandedAction(prev =>
    prev?.tab === tab && prev?.idx === idx ? null : { tab, idx }
  );
  const isExpanded   = (tab, idx) => expandAll || (expandedAction?.tab === tab && expandedAction?.idx === idx);

  const generateActionSummary = async () => {
    setSummaryLoading(true); setActionSummary(null);
    try {
      const res  = await fetch('/api/scenario/briefing', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ type: 'actions' })
      });
      const data = await res.json();
      setActionSummary(data.briefing);
    } catch (err) {
      setActionSummary('Failed to generate summary: ' + err.message);
    } finally {
      setSummaryLoading(false);
    }
  };
  const charts = chartData?.charts || {};
  const execSummary = scenarioData?.executiveSummary ||
    'This is not a normal market event. It is an infrastructure event. Standard VaR, delta hedging, margin management, and pricing frameworks assume exchange availability. A CME closure creates pricing gaps, frozen margin, unhedged positions, liquidity stress, and regulatory escalation requiring immediate CRO leadership attention.';

  const SectionHeader = ({ letter, title }) => (
    <div className="scenario-section-header">
      <span className="section-letter">{letter}</span>
      {title}

      {/* Metadata cards */}
      <div className="scenario-meta-grid">
        {CME_META.map(m => (
          <div key={m.label} className="scenario-meta-card">

              className={`actions-dropdown-btn ${actionsMenuOpen ? 'open' : ''}`}

              <i className="fa-solid fa-bolt"></i>
              Actions

            </button>
            {actionsMenuOpen && (
              <div className="actions-dropdown-menu">

                  { type:'cro',       icon:'fa-user-tie',       label:'Generate CRO Briefing' },

                  <td><span className={`sev-badge sev-${r.sev.toLowerCase()}`}>{r.sev}</span></td>

          { title:'Business Lines Impacted',  items:SCOPE.businessLines },

            </div>
            <div className="reg-card-body">{r.body}</div>
          </div>
        ))}

      <div className="reg-note"><i className="fa-solid fa-circle-info" style={{marginRight:6}}></i>Confirm all reporting obligations with Legal &amp; Compliance before submitting notifications.</div>

              </span>
            </button>
          ))}
        </div>

        <div className="playbook-toolbar">
          <span className="playbook-count">
            <i className="fa-solid fa-list-check" style={{marginRight:5,color:'var(--primary)'}}></i>
            {(ACTIONS[actionTab]||[]).length} actions · click any row to expand detail
          </span>
          <div className="playbook-toolbar-btns">
            <button className="btn-outline" style={{fontSize:12,padding:'6px 14px'}}
              onClick={() => { setExpandAll(p => !p); setExpandedAction(null); }}>
              <i className={`fa-solid ${expandAll ? 'fa-compress' : 'fa-expand'}`}></i>
              {expandAll ? 'Collapse All' : 'Expand All'}
            </button>
            <button className="btn-primary" style={{fontSize:12,padding:'6px 14px'}}
              onClick={generateActionSummary} disabled={summaryLoading}>
              {summaryLoading
                ? <><div className="spinner" style={{width:12,height:12,borderWidth:2}}></div> Generating…</>
                : <><i className="fa-solid fa-wand-magic-sparkles"></i> Generate Action Summary</>}
            </button>
          </div>
        </div>

        <div>
          {(ACTIONS[actionTab]||[]).map((action, i) => (
            <ActionRow
              key={i} action={action} idx={i}
              isExpanded={isExpanded(actionTab, i)}
              onToggle={() => toggleAction(actionTab, i)}
            />
          ))}
        </div>

        {(actionSummary || summaryLoading) && (
          <div className="action-summary-panel">
            <div className="action-summary-header">
              <i className="fa-solid fa-wand-magic-sparkles"></i>
              AI Action Summary
              {summaryLoading && <div className="spinner" style={{width:12,height:12,borderWidth:2,marginLeft:6}}></div>}
            </div>
            {actionSummary && <div>{actionSummary}</div>}
          </div>
        )}
      </div>

      {/* Source note */}
      <div className="source-note" style={{marginTop:8}}>
        <i className="fa-solid fa-database"></i>
        Source: Scenario_Analysis_Module.docx and Scenario_Analysis_ChartData.xlsx — Generated for internal CRO / Board restricted use.
      </div>
    </div>
  );
}

  const [briefing,           setBriefing]           = useState(null);
  const [generatingBriefing, setGeneratingBriefing] = useState(false);

  useEffect(() => {
    Promise.all([
      fetch('/api/scenario/data').then(r => r.json()).catch(() => ({ available:false })),
      fetch('/api/scenario/chart-data').then(r => r.json()).catch(() => ({ available:false }))
    ]).then(([doc, charts]) => {
      setScenarioData(doc);
      setChartData(charts);
      setLoading(false);
    });
  }, []);

  const handleSelect = async (id) => {
    setTransitioning(true);
    await minDelay(10000, 15000);
    setSelected(id);
    setTransitioning(false);
  };

  const generateBriefing = async (type) => {
    setBriefingType(type);
    setGeneratingBriefing(true);
    setShowBriefing(true);
    setBriefing(null);
    try {
      const [res] = await Promise.all([
        fetch('/api/scenario/briefing', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ type }) }),
        minDelay(8000, 20000)
      ]);
      const data = await res.json();
      setBriefing(data.briefing);
    } catch (err) {
      setBriefing('Failed to generate briefing: ' + err.message);
    } finally {
      setGeneratingBriefing(false);
    }
  };

  if (loading) return <div className="page"><div className="spinner-wrap"><div className="spinner"></div> Loading scenario data…</div></div>;

  if (transitioning) return (
    <div className="page">
      <ProcessingView
        title="Loading Scenario Dashboard"
        icon="fa-radiation"
        messages={[
          'Initialising stress scenario engine…',
          'Loading risk transmission model…',
          'Fetching quantification parameters…',
          'Building war-room dashboard…',
          'Resolving regulatory notification matrix…',
          'Preparing scenario intelligence data…',
        ]}
      />
    </div>
  );

  if (!selected) return <ScenarioLibrary onSelect={handleSelect} />;

  if (selected !== 4) {
    return (
      <div className="page">
        <button className="btn-outline" style={{marginBottom:20,fontSize:13}} onClick={() => setSelected(null)}>
          <i className="fa-solid fa-arrow-left"></i> Scenario Library
        </button>
        <div className="card" style={{textAlign:'center',padding:'64px 40px'}}>
          <div style={{fontSize:40,marginBottom:16,color:'var(--border)'}}>🚧</div>
          <div style={{fontSize:18,fontWeight:700,marginBottom:8}}>Detailed dashboard coming soon</div>
          <div style={{color:'var(--text-2)',fontSize:14}}>This scenario is currently in development. Please check back in a future release.</div>
        </div>
      </div>
    );
  }

  return (
    <CMEDashboard
      scenarioData={scenarioData}
      chartData={chartData}
      onBack={() => setSelected(null)}
      onGenerateBriefing={generateBriefing}
      briefing={briefing}
      briefingType={briefingType}
      generatingBriefing={generatingBriefing}
      showBriefing={showBriefing}
      setShowBriefing={setShowBriefing}
    />
  );
}

const SCATTER_COLORS = ['#8B1C1C','#1E3A5F','#059669','#D97706','#7C3AED','#DB2777','#0284C7','#0F766E'];
const CLUSTER_BORDER_COLORS = ['#6B1515','#162D4A','#047857','#B45309','#6D28D9','#BE185D','#0369A1','#0F5C55'];

function getPctKey(row) {
  return Object.keys(row).find(k => k.toLowerCase().includes('pct') && k.toLowerCase().includes('100')) || '';
}

function riskPillClass(r) {
  const s = String(r).toLowerCase();
  if (s.includes('critical')) return 'critical';
  if (s.includes('high'))     return 'high';
  if (s.includes('medium') || s.includes('med')) return 'medium';
  if (s.includes('low'))      return 'low';
  return '';
}

function statusPillClass(s) {
  const v = String(s).toLowerCase();
  if (v.includes('escal') || v.includes('mlro')) return 'escalated';
  if (v.includes('invest'))   return 'invest';
  if (v.includes('monitor'))  return 'monitor';
  return '';
}

function riskCardClass(s) {
  const v = String(s).toLowerCase();
  if (v.includes('high') || v.includes('critical')) return 'high';
  if (v.includes('medium')) return 'medium';
  return 'low';
}

function ScatterPlotChart({ data, xCol, yCol }) {
  const canvasRef = useRef(null);
  const chartRef  = useRef(null);

  const isCurrency = col => col && (col.toLowerCase().includes('gbp') || col.toLowerCase().includes('amount'));
  const formatVal  = (col, v) => isCurrency(col) ? `£${Number(v).toLocaleString()}` : Number(v).toLocaleString();

  useEffect(() => {
    if (!canvasRef.current) return;
    if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }
    if (!data || !data.length || !xCol || !yCol) return;

    const clusters = {};
    data.forEach(row => {
      const label = String(row['Cluster Label'] || row['Cluster'] || 'Unknown');
      if (!clusters[label]) clusters[label] = [];
      clusters[label].push(row);
    });

    const clusterList = Object.keys(clusters);

    const config = {
      type: 'scatter',
      data: {
        datasets: clusterList.map((label, idx) => ({
          label,
          data: clusters[label].map(r => {
            const pctKey = getPctKey(r);
            return {
              x: parseFloat(r[xCol]) || 0,
              y: parseFloat(r[yCol]) || 0,
              partyId:     r['Party ID'],
              riskRating:  r['Risk Rating'],
              crossBorder: r['Cross-Border TXN Count'],
              pctAbove:    pctKey ? r[pctKey] : null,
              distance:    r['Distance from Centroid'],
              flag:        r['Flag / Note'] || r['Flag  Note'] || ''
            };
          }),
          backgroundColor: SCATTER_COLORS[idx % SCATTER_COLORS.length] + 'BB',
          borderColor:     SCATTER_COLORS[idx % SCATTER_COLORS.length],
          pointRadius: 7, pointHoverRadius: 11, borderWidth: 1.5
        }))
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { position: 'top', labels: { font: { family: 'Inter', size: 12 }, padding: 14 } },
          title: { display: false },
          tooltip: {
            callbacks: {
              title: items => items.length ? `Party: ${items[0].raw.partyId || 'N/A'}` : '',
              label: ctx => {
                const p = ctx.raw;
                const pct = p.pctAbove !== null && p.pctAbove !== undefined
                  ? (parseFloat(p.pctAbove) <= 1 ? (parseFloat(p.pctAbove)*100).toFixed(1)+'%' : parseFloat(p.pctAbove).toFixed(1)+'%')
                  : 'N/A';
                return [
                  `Cluster: ${ctx.dataset.label}`,
                  `Risk Rating: ${p.riskRating || 'N/A'}`,
                  `${xCol}: ${formatVal(xCol, p.x)}`,
                  `${yCol}: ${formatVal(yCol, p.y)}`,
                  `Cross-Border TXN: ${p.crossBorder ?? 'N/A'}`,
                  `>£100K: ${pct}`,
                  `Distance from Centroid: ${typeof p.distance === 'number' ? p.distance.toFixed(2) : (p.distance ?? 'N/A')}`,
                  ...(p.flag ? [`Flag: ${p.flag}`] : [])
                ];
              }
            },
            backgroundColor: 'rgba(15,23,42,0.93)',
            titleColor: '#fff', bodyColor: 'rgba(255,255,255,0.82)',
            padding: 12, cornerRadius: 8, displayColors: true
          }
        },
        scales: {
          x: {
            title: { display: true, text: xCol, font: { family: 'Inter', size: 12 }, color: '#475569' },
            ticks: { callback: v => formatVal(xCol, v), font: { family: 'Inter', size: 11 } },
            grid: { color: 'rgba(0,0,0,0.05)' }
          },
          y: {
            title: { display: true, text: yCol, font: { family: 'Inter', size: 12 }, color: '#475569' },
            ticks: { callback: v => formatVal(yCol, v), font: { family: 'Inter', size: 11 } },
            grid: { color: 'rgba(0,0,0,0.05)' }
          }
        }
      }
    };
    chartRef.current = new Chart(canvasRef.current.getContext('2d'), config);
    return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
  }, [JSON.stringify(data), xCol, yCol]);

  if (!data || !data.length || !xCol || !yCol) return <div style={{padding:30,color:'var(--text-3)',textAlign:'center'}}>No scatter data to display.</div>;
  return <div style={{position:'relative',height:420}}><canvas ref={canvasRef}></canvas></div>;
}

function buildAnomalyNarrative(a) {
  const riskRating   = String(a['Risk Rating'] || '');
  const clusterLabel = a['Cluster Label'] || a['Cluster'] || '';
  const anomalyType  = a['Anomaly Type'] || '';
  const distRaw      = parseFloat(a['Distance from Centroid']);
  const dist         = isNaN(distRaw) ? null : distRaw;
  const status       = a['Investigation Status'] || '';
  const topFeats     = a['Top Features'] || '';
  const amlNarrative = a['Notes / AML Narrative'] || a['Notes  AML Narrative'] || '';
  const isHighRisk   = /(high|critical)/i.test(riskRating);
  const isEscalated  = /(mlro|escal)/i.test(status);

  let behaviouralPattern;
  if (amlNarrative) {
    behaviouralPattern = amlNarrative;
  } else if (anomalyType && dist !== null) {
    const severity = dist > 5 ? 'materially elevated' : dist > 2 ? 'elevated' : 'moderate';
    behaviouralPattern = `Party exhibits ${severity} behavioural deviation from its cluster centroid (distance: ${dist.toFixed(2)}), consistent with ${anomalyType} typology indicators. Behaviour suggests deviation from expected activity profile within the ${clusterLabel || 'assigned'} cluster.`;
  } else {
    behaviouralPattern = 'Not available in source dataset.';
  }

  const keyDrivers = topFeats || 'Not available in source dataset.';

  let riskIndicatorParts = [];
  if (anomalyType) riskIndicatorParts.push(`Anomaly classification: ${anomalyType}`);
  if (dist !== null) {
    const level = dist > 5 ? 'high' : dist > 2 ? 'moderate' : 'low';
    riskIndicatorParts.push(`Centroid distance indicates ${level} behavioural deviation from cluster norm`);
  }
  if (isHighRisk) riskIndicatorParts.push(`${riskRating} risk rating indicates elevated monitoring attention`);
  if (clusterLabel) riskIndicatorParts.push(`Cluster assignment: ${clusterLabel}`);
  const riskIndicators = riskIndicatorParts.length
    ? riskIndicatorParts.join('. ') + '. Pattern may warrant further investigation against customer profile, expected activity documentation, and supporting transaction evidence.'
    : 'Not available in source dataset.';

  let reviewFocus;
  if (isEscalated) {
    reviewFocus = 'Case is currently escalated. Validate all supporting documentation, transaction purpose, counterparty relationships, and source of funds evidence before determining next action or regulatory notification requirement.';
  } else if (isHighRisk) {
    reviewFocus = 'Enhanced due diligence review is indicated given the High risk rating. Validate transaction purpose, counterparty profile, source of funds, and any linked trade documentation. Consider whether escalation thresholds have been met.';
  } else {
    reviewFocus = 'Review transaction patterns against customer profile and expected activity thresholds. Confirm monitoring disposition and validate supporting evidence before case closure or status update.';
  }

  return { behaviouralPattern, keyDrivers, riskIndicators, investigationStatus: status || 'Not available in source dataset.', reviewFocus };
}

function parseInsightsSections(text) {
  if (!text) return [];
  const lines = text.split('\n');
  const sections = [];
  let cur = null;
  for (const line of lines) {
    const m = line.match(/^(\d+)\.\s+([^:]+):\s*(.*)/);
    if (m) {
      if (cur) sections.push(cur);
      cur = { num: m[1], label: m[2].trim(), content: m[3].trim() };
    } else if (cur && line.trim()) {
      cur.content += (cur.content ? ' ' : '') + line.trim();
    }
  }
  if (cur) sections.push(cur);
  return sections;
}

  risk:       { icon: 'fa-shield-halved', cls: 'risk' },
  regulatory: { icon: 'fa-gavel',         cls: 'regulatory' },

function classifClass(c) {
  if (!c) return '';
  const v = c.toLowerCase();
  if (v.includes('confidential')) return 'classif-confidential';
  if (v.includes('restrict'))     return 'classif-restricted';
  if (v.includes('internal'))     return 'classif-internal';
  if (v.includes('public'))       return 'classif-public';
  return '';
}
function statusClass(s) {
  if (!s) return '';
  const v = s.toLowerCase();
  if (v.includes('active') || v.includes('live')) return 'status-active';
  if (v.includes('review') || v.includes('draft')) return 'status-review';
  return '';
}

function parseSummaryText(text) {
  if (!text) return [];
  const sections = [];
  let cur = null;
  for (const line of text.split('\n')) {
    // Match **Label [TAG]:**, **Label [TAG]**, or **Label:**
    const m = line.match(/^\*\*([^*\[\]]+?)(?:\s*\[(EXTRACTED|INFERRED)\])?\s*:?\*\*\s*(.*)/i);
    if (m) {
      if (cur) sections.push(cur);
      cur = {
        label:      m[1].replace(/:$/, '').trim(),
        confidence: m[2] ? m[2].toUpperCase() : null,
        content:    m[3].trim()
      };
    } else if (cur && line.trim()) {
      cur.content += (cur.content ? '\n' : '') + line.trim();
    }
  }
  if (cur) sections.push(cur);
  return sections;
}

function VaultPage() {

  const [error,          setError]         = useState(null);

  const [summarySource,  setSummarySource] = useState('');
  const [search,         setSearch]        = useState('');

  useEffect(() => {
    fetch('/api/vault/documents')
      .then(r => r.json())
      .then(d => { if (d.available) setDocs(d.documents); else setError(d.message); setLoading(false); })
      .catch(() => { setError('Failed to connect to server.'); setLoading(false); });
  }, []);

  const generateSummary = async (doc) => {
    setSelectedDoc(doc); setSummary(null); setSummaryLoading(true);
    try {
      const res = await fetch('/api/vault/summary', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ section: doc.section, index: doc.index })
      });
      const data = await res.json();
      setSummary(data.summary || 'No summary generated.');
      setSummarySource(data.source || '');
    } catch { setSummary('Failed to generate summary. Please try again.'); }
    setSummaryLoading(false);
  };

  const closePanel = () => { setSelectedDoc(null); setSummary(null); };

  const totalDocs = docs
    ? Object.values(docs).reduce((s, arr) => s + (arr?.length || 0), 0)
    : 0;

  if (loading) return (
    <div className="page">
      <div className="page-header"><div className="page-title">Knowledge Vault</div></div>
      <div className="spinner-wrap"><div className="spinner"></div><span>Loading knowledge vault…</span></div>
    </div>
  );

  return (
    <div className="page" style={{maxWidth:1300}}>
      <div className="page-header">
        <div className="page-title">Knowledge Vault</div>
        <div className="page-sub">Internal knowledge base Risk, Regulatory, and Email intelligence documents. Summaries generated on-demand from source documents only.</div>
      </div>

      {error ? (
        <div className="alert alert-info" style={{maxWidth:600}}>
          <i className="fa-solid fa-folder-open alert-icon"></i>
          <div>
            <div style={{fontWeight:600,marginBottom:4}}>Vault data not loaded</div>
            <div>{error}</div>
            <div style={{marginTop:8,fontSize:12,color:'var(--text-3)'}}>
              Place <strong>Vault+Report_Page_Data.docx</strong> in the <code>data/vault/</code> folder, then restart the server.
            </div>
          </div>
        </div>
      ) : (
        <>
          {/* Tabs */}
          <div className="vault-tabs">
            {VAULT_TABS.map(t => {
              const isDocTab = VAULT_DOC_TABS.has(t.key);
              const count = isDocTab ? (docs?.[t.key]?.length || 0) : null;
              return (
                <button key={t.key} className={`vault-tab${activeTab === t.key ? ' active' : ''}`}
                  onClick={() => { setActiveTab(t.key); setSearch(''); }}>
                  <i className={`fa-solid ${t.icon}`}></i>
                  {t.label}
                  {count != null && <span className="vault-tab-count">{count}</span>}
                </button>
              );
            })}
          </div>

          {/* Search — only for document tabs */}
          {VAULT_DOC_TABS.has(activeTab) && (
            <div className="vault-search">
              <input className="input-box" style={{maxWidth:320,fontSize:13,padding:'8px 12px'}}
                placeholder={`Search ${VAULT_TABS.find(t=>t.key===activeTab)?.label}…`}
                value={search} onChange={e => setSearch(e.target.value)} />
              {search && (
                <button onClick={() => setSearch('')} style={{background:'none',border:'none',cursor:'pointer',color:'var(--text-3)',fontSize:14}}>
                  <i className="fa-solid fa-xmark"></i>
                </button>
              )}
            </div>
          )}

          {/* Tab content */}
          {activeTab === 'insights' ? (
            <InsightsDataTab />
          ) : activeTab === 'report' ? (
            <ReportGeneratorTab />
          ) : (
            <div className="vault-layout">
              <div>
                {(() => {
                  const tabDocs = (docs?.[activeTab] || []).filter(d =>
                    !search || d.title.toLowerCase().includes(search.toLowerCase()) ||

                      <div className="vault-empty-state">

function ReportChart({ chartData, chartType, title, metrics }) {
  const canvasRef = React.useRef(null);
  React.useEffect(() => {
    if (!canvasRef.current || !chartData) return;
    if (canvasRef.current._chartInst) canvasRef.current._chartInst.destroy();
    const isHBar = chartType === 'horizontalBar';
    const isDoughnut = chartType === 'doughnut';
    const colors = ['#3b82f6','#ef4444','#10b981','#f59e0b','#8b5cf6','#06b6d4','#ec4899','#14b8a6','#f97316','#84cc16'];
    canvasRef.current._chartInst = new Chart(canvasRef.current, {
      type: isDoughnut ? 'doughnut' : 'bar',
      data: {
        labels: chartData.labels,
        datasets: [{
          label: title,
          data: chartData.values,
          backgroundColor: isDoughnut ? colors.slice(0, chartData.labels.length) : '#3b82f6',
          borderColor: isDoughnut ? '#fff' : '#3b82f6',
          borderWidth: isDoughnut ? 2 : 0,
          borderRadius: isDoughnut ? 0 : 4,
        }]
      },
      options: {
        indexAxis: isHBar ? 'y' : 'x',
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: isDoughnut, position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } },
          tooltip: { callbacks: { label: ctx => { const v = ctx.parsed[isHBar ? 'x' : 'y']; return (title.includes('Volume') || title.includes('Exposure')) ? ` £${Number(v).toLocaleString()}` : ` ${Number(v).toLocaleString()}`; } } }
        },
        scales: isDoughnut ? {} : {
          x: { grid: { color: 'rgba(148,163,184,0.08)' }, ticks: { font: { size: 10.5 } } },
          y: { grid: { color: 'rgba(148,163,184,0.08)' }, ticks: { font: { size: 10.5 } } }
        }
      }
    });
    return () => { if (canvasRef.current?._chartInst) canvasRef.current._chartInst.destroy(); };
  }, []);
  return (
    <div className="report-chart-card">
      <div className="report-chart-title">{title}</div>
      {metrics && (
        <div className="report-chart-kpis">
          {Object.entries(metrics).map(([k,v]) => (
            <div key={k} className="report-chart-kpi"><strong>{k}:</strong> {v}</div>
          ))}
        </div>
      )}
      <div style={{position:'relative', height: chartType === 'doughnut' ? 200 : 210}}>
        <canvas ref={canvasRef}></canvas>
      </div>
    </div>
  );
}
