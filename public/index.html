function ReportGeneratorTab() {
  const [sources,        setSources]       = useState(null);
  const [selected,       setSelected]      = useState({ risk: true, regulatory: true, emails: true, insights: true });
  const [fromDate,       setFromDate]      = useState('');
  const [toDate,         setToDate]        = useState('');
  const [includeUndated, setIncludeUndated]= useState(true);
  const [generating,     setGenerating]    = useState(false);
  const [genEmail,       setGenEmail]      = useState(false);
  const [report,         setReport]        = useState(null);
  const [insightsData,   setInsightsData]  = useState(null);
  const [emailText,      setEmailText]     = useState(null);
  const [error,          setError]         = useState(null);

  const printReport = React.useCallback((rpt, ref) => {
    const node = ref?.current;
    if (!node) return;

    // 1. Clone the live report DOM (same document = CSS vars + canvas access works)
    const clone = node.cloneNode(true);
    clone.querySelectorAll('.report-print-btn').forEach(el => el.remove());

    // 2. Capture every Chart.js canvas using the afterRender snapshot (white bg guaranteed)
    //    cv._chartInst is the Chart instance, cv._printDataUrl is set by the snapshotForPrint plugin
    const origCanvases = Array.from(node.querySelectorAll('canvas'));
    const cloneCanvases = Array.from(clone.querySelectorAll('canvas'));
    origCanvases.forEach((cv, i) => {
      try {
        // Method A: pre-captured snapshot from the afterRender plugin
        let dataUrl = (cv._printDataUrl && cv._printDataUrl.length > 100)
          ? cv._printDataUrl
          : null;

        // Method B: offscreen composite with explicit white fill (fallback)
        if (!dataUrl || dataUrl === 'data:,' || dataUrl.length < 100) {
          const w = cv.width || 700;
          const h = cv.height || 280;
          const off = document.createElement('canvas');
          off.width = w; off.height = h;
          const ctx2 = off.getContext('2d');
          ctx2.fillStyle = '#ffffff';
          ctx2.fillRect(0, 0, w, h);
          ctx2.drawImage(cv, 0, 0);
          dataUrl = off.toDataURL('image/png');
        }

        if (!dataUrl || dataUrl.length < 100) return;

        const img = document.createElement('img');
        img.src = dataUrl;
        img.style.cssText = 'width:100%;height:auto;display:block;margin:4px 0;background:#fff;border-radius:4px;';

        const target = cloneCanvases[i];
        if (target?.parentNode) {
          const wrapper = target.parentNode;
          wrapper.style.position = 'static';
          wrapper.style.height   = 'auto';
          wrapper.style.overflow = 'visible';
          wrapper.replaceChild(img, target);
        }
      } catch(e) {}
    });

    // 3. Inject portal into the SAME page (avoids cross-window canvas issues)
    document.getElementById('__print_portal__')?.remove();
    document.getElementById('__print_style__')?.remove();

    const portal = document.createElement('div');
    portal.id = '__print_portal__';
    portal.appendChild(clone);
    document.body.appendChild(portal);

    // 4. Print CSS: hide everything except portal, force white bg & readable colours
    const style = document.createElement('style');
    style.id = '__print_style__';
    style.textContent = `
      @media print {
        @page { size: A4; margin: 14mm 13mm; }
        body > *:not(#__print_portal__) { display: none !important; }
        #__print_portal__ {
          display: block !important; position: static !important;
          background: #fff !important; padding: 0; margin: 0;
        }
        #__print_portal__ * { color: #222 !important; background: transparent !important; box-shadow: none !important; }
        #__print_portal__ .report-output-header,
        #__print_portal__ .report-output-header * { background: #1e293b !important; color: #fff !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
        #__print_portal__ .report-section-title,
        #__print_portal__ .report-section-title * { color: #FFAD28 !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
        #__print_portal__ .report-section-content { white-space: pre-wrap; line-height: 1.75; }
        #__print_portal__ .report-section { page-break-inside: avoid; margin-bottom: 20px; }
        #__print_portal__ .report-charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        #__print_portal__ .report-chart-card { border: 1px solid #e5e7eb !important; border-radius: 6px; padding: 12px; page-break-inside: avoid; }
        #__print_portal__ .report-chart-title { font-size: 11px; font-weight: 700; margin-bottom: 8px; }
        #__print_portal__ .metric-card { border: 1px solid #e5e7eb !important; border-radius: 4px; padding: 8px 12px; }
        #__print_portal__ canvas { display: none !important; }
        #__print_portal__ img { max-width: 100% !important; height: auto !important; display: block; }
        #__print_portal__ .report-output { border: none !important; overflow: visible !important; }
        #__print_portal__ .report-body { overflow: visible !important; }
      }
    `;
    document.head.appendChild(style);

    // 5. Wait for layout/paint of the newly injected portal before printing (avoids
    //    a race condition where window.print() fires before images are laid out)
    const cleanup = () => {
      document.getElementById('__print_portal__')?.remove();
      document.getElementById('__print_style__')?.remove();
    };
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        window.print();
        window.addEventListener('afterprint', cleanup, { once: true });
        setTimeout(cleanup, 8000); // fallback if afterprint doesn't fire
      });
    });
  }, []);
  const reportRef = React.useRef(null);

  useEffect(() => {
    fetch('/api/reports/sources').then(r => r.json()).then(setSources).catch(() => setSources({}));
  }, []);

  const toggle = key => {
    if (sources?.[key]?.available === false) return;
    setSelected(s => ({ ...s, [key]: !s[key] }));
  };
  const anySelected = Object.values(selected).some(Boolean);

  const doGenerate = async () => {
    setGenerating(true); setReport(null); setInsightsData(null); setError(null);
    try {
      const [res] = await Promise.all([
        fetch('/api/reports/generate', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ selectedSources: selected, fromDate, toDate, includeUndated }) }),
        minDelay(8000, 15000)
      ]);
      const data = await res.json();
      setReport(data.report); setInsightsData(data.insightsData);
      setTimeout(() => reportRef.current?.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
    } catch { setError('Failed to generate report. Please check the server is running and try again.'); }
    setGenerating(false);
  };

  const doEmail = async () => {
    setGenEmail(true); setEmailText(null); setError(null);
    try {
      const res = await fetch('/api/reports/email', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ selectedSources: selected, fromDate, toDate, includeUndated })
      });
      const data = await res.json();
      setEmailText(data.email);
    } catch { setError('Failed to generate email.'); }
    setGenEmail(false);
  };

  return (
    <div style={{maxWidth:1080, margin:'0 auto'}}>

      {/* Centred header */}
      <div className="report-page-header">
        <div className="report-page-title">Intelligence Summary</div>
        <div className="report-page-sub">Select sources and a date range, then generate an executive intelligence brief.</div>
      </div>

      {/* Source cards */}
      <div className="report-sources-grid">
        {REPORT_SOURCES.map(src => {
          const avail = sources?.[src.key];
          const isSel = selected[src.key] && avail?.available !== false;
          const unavail = avail?.available === false;
          return (
            <div key={src.key} className={`report-source-card${isSel ? ' selected' : ''}${unavail ? ' unavailable' : ''}`} onClick={() => toggle(src.key)}>
              <div className="report-source-check">{isSel && <i className="fa-solid fa-check"></i>}</div>
              <div className={`report-source-icon ${src.cls}`}><i className={`fa-solid ${src.icon}`}></i></div>
              <div className="report-source-name">{src.label}</div>
              <div className="report-source-count">
                {avail == null ? '…' : unavail ? 'Not available' : `${avail.count} ${src.key === 'insights' ? 'datasets' : 'documents'} available`}
              </div>
              <div className="report-source-desc">{src.desc}</div>
            </div>
          );
        })}
      </div>

      {/* Date range */}
      <div className="report-date-section">
        <div className="report-date-title"><i className="fa-regular fa-calendar" style={{marginRight:6}}></i>Date Range</div>
        <div className="report-date-row">
          <div className="report-date-field">
            <label className="report-date-label">From Date</label>
            <input type="date" className="report-date-input" value={fromDate} onChange={e => setFromDate(e.target.value)} />
          </div>
          <div className="report-date-arrow"><i className="fa-solid fa-arrow-right"></i></div>
          <div className="report-date-field">
            <label className="report-date-label">To Date</label>
            <input type="date" className="report-date-input" value={toDate} onChange={e => setToDate(e.target.value)} />
          </div>
        </div>
        <div className="report-undated-row">
          <input type="checkbox" id="includeUndated" checked={includeUndated} onChange={e => setIncludeUndated(e.target.checked)} />
          <label htmlFor="includeUndated">Include records with no date</label>
        </div>
      </div>

      {/* Action buttons */}
      <div className="report-actions">
        <button className="report-action-btn primary" onClick={doGenerate} disabled={!anySelected || generating}>
          {generating
            ? <><div className="spinner" style={{width:14,height:14,borderWidth:2,borderTopColor:'#fff'}}></div>Generating Report…</>
            : <><i className="fa-solid fa-file-lines"></i>Generate Report</>}
        </button>
        <button className="report-action-btn secondary" onClick={doEmail} disabled={!anySelected || genEmail}>
          {genEmail
            ? <><div className="spinner" style={{width:14,height:14,borderWidth:2}}></div>Generating Email…</>
            : <><i className="fa-solid fa-envelope"></i>Generate Email</>}
        </button>
      </div>

      {generating && (
        <ProcessingView
          title="Composing Intelligence Report"
          icon="fa-file-lines"
          messages={[
            'Ingesting source documents…',
            'Extracting key risk narratives…',
            'Correlating regulatory data points…',
            'Structuring executive summary…',
            'Cross-referencing compliance signals…',
            'Compiling intelligence brief…',
            'Applying report formatting…',
          ]}

      {error && (
        <div className="alert alert-warning" style={{marginTop:16}}>
          <i className="fa-solid fa-triangle-exclamation alert-icon"></i>
          <div>{error}</div>
        </div>

      {/* Report output */}
      {report && (
        <div className="report-output" ref={reportRef}>
          <div className="report-output-header">
            <div>
              <div className="report-output-title"><i className="fa-solid fa-file-shield" style={{marginRight:8}}></i>Executive Intelligence Report</div>

                {(fromDate || toDate) && ` · ${fromDate || 'All'} → ${toDate || 'Present'}`}

            </div>
            <button className="report-print-btn" onClick={() => printReport(report, reportRef)}>
              <i className="fa-solid fa-print"></i>Export PDF
            </button>
          </div>
          <div className="report-body">
            {report.sections.map((sec, i) => {

  );
}

function ClusterScatterChart({ clusterRows, xCol, yCol }) {
  const canvasRef = React.useRef(null);
  const chartRef  = React.useRef(null);

  const CLUSTER_COLORS = ['#FFAD28','#3B82F6','#22C55E','#A855F7','#F97316','#EC4899'];

  React.useEffect(() => {
    if (!canvasRef.current || !clusterRows || !clusterRows.length || !xCol || !yCol) return;
    if (chartRef.current) chartRef.current.destroy();

    const clusters = {};
    clusterRows.forEach(r => {
      const lbl = String(r['Cluster Label'] || r['Cluster'] || 'Unknown');
      if (!clusters[lbl]) clusters[lbl] = [];
      const xv = parseFloat(r[xCol]);
      const yv = parseFloat(r[yCol]);
      if (!isNaN(xv) && !isNaN(yv)) clusters[lbl].push({ x: xv, y: yv, party: r['Counterparty Name'] || r['Party ID'] || '' });
    });

    const datasets = Object.entries(clusters).map(([lbl, pts], i) => ({
      label: lbl,
      data: pts,
      backgroundColor: CLUSTER_COLORS[i % CLUSTER_COLORS.length] + 'BB',
      borderColor: CLUSTER_COLORS[i % CLUSTER_COLORS.length],
      borderWidth: 1,
      pointRadius: 5,
      pointHoverRadius: 7,
    }));

    chartRef.current = new Chart(canvasRef.current, {
      type: 'scatter',
      data: { datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { labels: { color: '#CBD5E1', font: { size: 11 } } },
          tooltip: {
            callbacks: {
              label: ctx => {
                const d = ctx.raw;
                return `${ctx.dataset.label}: (${Number(d.x).toFixed(2)}, ${Number(d.y).toFixed(2)})${d.party ? ' — ' + d.party : ''}`;
              }
            }
          }
        },
        scales: {
          x: { title: { display: true, text: xCol, color: '#94A3B8', font: { size: 11 } }, ticks: { color: '#64748B' }, grid: { color: 'rgba(255,255,255,0.06)' } },
          y: { title: { display: true, text: yCol, color: '#94A3B8', font: { size: 11 } }, ticks: { color: '#64748B' }, grid: { color: 'rgba(255,255,255,0.06)' } }
        }
      }
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [clusterRows, xCol, yCol]);

  if (!xCol || !yCol) return null;
  return <div style={{height:340,marginTop:12}}><canvas ref={canvasRef}></canvas></div>;
}

function RegressionEquationCard({ regression }) {
  if (!regression) return null;
  const { intercept, coefficients, r2, adj_r2, n } = regression;
  const coeffEntries = Object.entries(coefficients || {});
  const formulaParts = coeffEntries.map(([k,v]) => `${v >= 0 ? ' + ' : ' - '}(${Math.abs(v)} × ${k})`).join('');
  const formula = `Risk Score = ${intercept}${formulaParts}`;
  return (
    <div className="regression-eq-card">
      <div className="card-header" style={{padding:0,marginBottom:10}}>
        <span className="card-title"><i className="fa-solid fa-function" style={{marginRight:7,color:'#FFAD28'}}></i>Regression Equation</span>
      </div>
      <div className="eq-formula">{formula}</div>
      <div className="eq-coeff-grid">

function ScenarioSimulatorCard({ regression }) {
  if (!regression) return null;
  const { intercept, coefficients } = regression;

  const SLIDER_CONFIGS = {
    'Credit Rating Score':               { min: 0,   max: 100, step: 1,   default: 50,  unit: '' },
    'Number of Linked Entities':         { min: 0,   max: 50,  step: 1,   default: 10,  unit: '' },
    'Country Risk Score':                { min: 0,   max: 100, step: 1,   default: 40,  unit: '' },
    'High-Risk Jurisdiction %':          { min: 0,   max: 100, step: 1,   default: 20,  unit: '%' },
  };

  const slidableKeys = Object.keys(coefficients || {}).filter(k => SLIDER_CONFIGS[k]);
  const initVals = {};
  slidableKeys.forEach(k => { initVals[k] = SLIDER_CONFIGS[k].default; });

  const [vals, setVals] = React.useState(initVals);

  const computeScore = () => {
    let s = intercept || 0;
    Object.entries(coefficients || {}).forEach(([k, coef]) => {
      const v = vals[k] !== undefined ? vals[k] : (SLIDER_CONFIGS[k]?.default || 0);
      s += coef * v;
    });
    return Math.max(0, Math.min(100, s)).toFixed(1);
  };

  const score = parseFloat(computeScore());
  const band  = score < 10 ? 'Low'
              : score < 20 ? 'Medium'
              : score < 30 ? 'High'
              : 'Critical';
  const bandClass = score < 10 ? 'band-low' : score < 20 ? 'band-med' : score < 30 ? 'band-high' : 'band-crit';

  const updateSlider = (k, v) => setVals(prev => ({ ...prev, [k]: parseFloat(v) }));

  return (
    <div className="scenario-simulator-card">
      <div className="card-header" style={{padding:0,marginBottom:12}}>
        <span className="card-title"><i className="fa-solid fa-sliders" style={{marginRight:7,color:'#FFAD28'}}></i>Sensitivity Simulator</span>
        <span style={{fontSize:12,color:'var(--text-3)'}}>Adjust inputs to model predicted risk</span>
      </div>
      <div className="sim-grid">
        {slidableKeys.map(k => {
          const cfg = SLIDER_CONFIGS[k];
          const pct = ((vals[k] - cfg.min) / (cfg.max - cfg.min) * 100).toFixed(1) + '%';
          return (
            <div key={k} className="sim-slider-wrap">
              <div className="sim-slider-label">
                <span>{k}</span>
                <span className="sim-slider-val">{vals[k]}{cfg.unit}</span>
              </div>
              <input
                type="range" className="sim-slider"
                min={cfg.min} max={cfg.max} step={cfg.step}
                value={vals[k]}
                style={{'--pct': pct}}
                onChange={e => updateSlider(k, e.target.value)}
              />
            </div>
          );
        })}
      </div>
      <div className="sim-result-row">
        <div className="sim-result-score">{score}%</div>
        <div>
          <div className="sim-result-label">Predicted Risk Score</div>
          <div className={`sim-result-band ${bandClass}`}>{band} Risk</div>
        </div>
      </div>
    </div>
  );
}

function ModelSummarySection({ summary, loading }) {
  const [openIdx, setOpenIdx] = React.useState(null);
  if (!loading && !summary) return null;

  // Parse numbered sections from raw text, stripping markdown bold markers
  const parseSections = (text) => {
    if (!text) return [];
    // Split on numbered bullets (may appear after newline or at start)
    const parts = text.split(/\n+(?=\d+[\.\)])/);
    return parts.map(p => {
      const clean = p.replace(/\*\*/g, '').trim();
      // Match: "1. Label: content" or "1. Label content"
      const withColon = clean.match(/^(\d+)[\.\)]\s+([^:\n]{3,60}):\s*([\s\S]*)/);
      if (withColon) return { num: withColon[1], label: withColon[2].trim(), content: withColon[3].trim() };
      // No colon — use first 4 words as label, rest as content
      const plain = clean.match(/^(\d+)[\.\)]\s+([\s\S]*)/);
      if (plain) {
        const words = plain[2].trim().split(/\s+/);
        const label = words.slice(0, 4).join(' ');
        const content = words.slice(4).join(' ');
        return { num: plain[1], label, content };
      }
      return null;
    }).filter(Boolean);
  };

  const sections = parseSections(summary);

  return (
    <div className="card" style={{marginTop:16}}>
      <div className="card-header">
        <span className="card-title"><i className="fa-solid fa-lightbulb" style={{marginRight:7,color:'#FFAD28'}}></i>Model Intelligence Summary</span>
        {loading && <span style={{display:'flex',alignItems:'center',gap:6,fontSize:12,color:'var(--text-3)'}}><div className="spinner" style={{width:13,height:13,borderWidth:2}}></div> Generating…</span>}
      </div>
      {sections.length >= 2 ? (
        <div style={{display:'flex',flexDirection:'column',gap:6}}>
          {sections.map((s, i) => (
            <div key={i} style={{border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',overflow:'hidden'}}>
              <button
                onClick={() => setOpenIdx(openIdx === i ? null : i)}
                style={{width:'100%',display:'flex',alignItems:'center',gap:10,padding:'10px 14px',background: openIdx===i ? 'rgba(255,173,40,0.08)' : 'var(--surface)',border:'none',cursor:'pointer',textAlign:'left'}}
              >
                <span style={{minWidth:22,height:22,borderRadius:'50%',background: openIdx===i ? 'var(--primary)' : 'rgba(255,173,40,0.15)',color: openIdx===i ? '#000' : 'var(--primary)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800,flexShrink:0}}>{s.num}</span>
                <span style={{fontSize:13,fontWeight:600,color:'var(--text)',flex:1}}>{s.label || `Point ${s.num}`}</span>
                <i className={`fa-solid fa-chevron-${openIdx===i ? 'up' : 'down'}`} style={{fontSize:11,color:'var(--text-3)'}}></i>
              </button>
              {openIdx === i && (
                <div style={{padding:'10px 14px 14px 46px',fontSize:13,color:'var(--text-2)',lineHeight:1.7,borderTop:'1px solid var(--border)',background:'rgba(255,173,40,0.03)'}}>
                  {s.content}
                </div>
              )}
            </div>
          ))}
        </div>
      ) : summary ? (
        <div style={{display:'flex',flexDirection:'column',gap:6}}>
          {summary.replace(/\*\*/g,'').split(/\n+/).filter(l => l.trim()).map((line, i) => (
            <div key={i} style={{padding:'9px 14px',fontSize:13,color:'var(--text-2)',lineHeight:1.65,borderLeft:'3px solid rgba(255,173,40,0.3)',background:'rgba(255,173,40,0.03)',borderRadius:'0 var(--radius-sm) var(--radius-sm) 0'}}>{line}</div>
          ))}
        </div>
      ) : null}
    </div>
  );
}

      <div className="page-header" style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
        <div>
          <div className="page-title">Analytics Lab</div>
          <div className="page-sub">Predictive analytics: clustering, regression and time series models for counterparty risk</div>
        </div>
        <button onClick={() => loadData(true)} disabled={refreshing}
          style={{display:'flex',alignItems:'center',gap:7,padding:'8px 16px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--radius)',color:'var(--text)',fontSize:13,fontWeight:600,cursor:refreshing?'not-allowed':'pointer',opacity:refreshing?0.6:1}}>
          <i className={`fa-solid fa-rotate-right${refreshing?' fa-spin':''}`}></i>{refreshing ? 'Refreshing…' : 'Refresh Data'}
        </button>
      </div>

      {/* Model Selector */}
      <div className="analysis-model-selector">
        <label>Select Model</label>
        <select className="analysis-model-select" value={activeModel} onChange={e => setActiveModel(e.target.value)}>
          <option value="clustering">Clustering</option>
          <option value="regression">Regression Analysis</option>
          <option value="timeseries">Time Series Analysis</option>
        </select>
        <span style={{fontSize:12,color:'var(--text-3)'}}>
          {activeModel === 'clustering'  && 'K-Means counterparty segmentation by risk profile'}
          {activeModel === 'regression'  && 'Linear regression — counterparty risk score prediction'}
          {activeModel === 'timeseries'  && 'Portfolio exposure forecast with 95% confidence interval'}
        </span>
      </div>

      <div className="analysis-layout">

        {/* Left: Feature Catalogue */}
        <div className="analysis-left">
          <div className="card" style={{padding:'16px'}}>
            <div className="card-header" style={{marginBottom:12}}>
              <span className="card-title">Feature Catalogue</span>
              <span style={{fontSize:12,color:'var(--text-3)'}}>{filteredCat.length} features</span>
            </div>
            <input className="input-box" style={{marginBottom:8,fontSize:13,padding:'8px 12px'}}
              placeholder="Search features…" value={catSearch} onChange={e => setCatSearch(e.target.value)} />
            <select className="analysis-select" style={{marginBottom:6}} value={catFilter} onChange={e => setCatFilter(e.target.value)}>
              {categories.map(c => <option key={c}>{c}</option>)}
            </select>
            {riskKey && (
              <select className="analysis-select" style={{marginBottom:10}} value={riskFilter} onChange={e => setRiskFilter(e.target.value)}>
                {riskLevels.map(r => <option key={r}>{r}</option>)}
              </select>
            )}
            <div style={{fontSize:11,color:'var(--text-3)',marginBottom:8,fontStyle:'italic'}}>Drag features into drop zones →</div>
            <div className="feature-list">
              {filteredCat.map((f, i) => (
                <FeatureCard
                  key={i} feature={f}
                  selected={clusterFeatures.includes(f['Feature Name']) || regrYFeatures.includes(f['Feature Name']) || regrXFeatures.includes(f['Feature Name'])}
                  onClick={() => {
                    if (activeModel === 'clustering') {
                      const n = f['Feature Name'];
                      setClusterFeatures(prev => prev.includes(n) ? prev.filter(x => x !== n) : [...prev, n]);
                    }
                  }}
                  draggable={true}
                  onDragStart={e => onDragStart(e, f['Feature Name'])}
                  extraClass="feat-card-draggable"
                />
              ))}
              {!filteredCat.length && <div style={{color:'var(--text-3)',fontSize:13,textAlign:'center',padding:20}}>No features match filters.</div>}
            </div>
          </div>
        </div>

        {/* Right: Model-specific panel */}
        <div className="analysis-right">

          {isProcessing ? (
            <ProcessingView
              title={activeModel === 'clustering' ? 'Running Cluster Model' : activeModel === 'regression' ? 'Running Regression Analysis' : 'Running Time Series Forecast'}
              icon={activeModel === 'timeseries' ? 'fa-chart-line' : 'fa-magnifying-glass-chart'}
              messages={processingMessages}
            />
          ) : activeModel === 'clustering' ? (
            <>
              {/* Clustering: drop zone */}
              <div className="analysis-dz-row">
                <div className={`analysis-drop-zone${clusterDzActive ? ' dz-active' : ''}`} {...clusterDzHandlers}>
                  <div className="adz-label"><i className="fa-solid fa-layer-group" style={{marginRight:6}}></i>Clustering Features (drop or click ≥2)</div>
                  {clusterFeatures.length === 0
                    ? <div className="adz-hint">Drag features here or click in the catalogue</div>
                    : <div className="adz-chips">
                        {clusterFeatures.map(f => (
                          <span key={f} className="adz-chip">
                            {f}
                            <button onClick={() => setClusterFeatures(prev => prev.filter(x => x !== f))}>×</button>
                          </span>
                        ))}
                      </div>
                  }
                </div>
              </div>

              {clusterFeatures.length >= 2 && !clusterRun && (
                <button className="run-analysis-btn" onClick={runClustering}>
                  <i className="fa-solid fa-circle-play"></i>Run Clustering Model
                </button>
              )}
              {clusterFeatures.length < 2 && (
                <div style={{fontSize:13,color:'var(--text-3)',marginTop:8,fontStyle:'italic'}}>Select at least 2 features to run the clustering model.</div>
              )}

              {clusterRun && (
                <>
                  <div className="card" style={{marginTop:16}}>
                    <div className="card-header">
                      <span className="card-title">Counterparty Clusters</span>
                      <div style={{display:'flex',gap:8,alignItems:'center'}}>
                        <select className="analysis-select" value={clusterXCol || clusterNumericCols[0] || ''} onChange={e => setClusterXCol(e.target.value)}>
                          {clusterNumericCols.map(c => <option key={c}>{c}</option>)}
                        </select>
                        <span style={{fontSize:12,color:'var(--text-3)'}}>vs</span>
                        <select className="analysis-select" value={clusterYCol || clusterNumericCols[1] || ''} onChange={e => setClusterYCol(e.target.value)}>
                          {clusterNumericCols.map(c => <option key={c}>{c}</option>)}
                        </select>
                      </div>
                    </div>
                    <ClusterScatterChart
                      clusterRows={clusterRows}
                      xCol={clusterXCol || clusterNumericCols[0] || ''}
                      yCol={clusterYCol || clusterNumericCols[1] || ''}
                    />
                  </div>

                  {clusterDescs && (
                    <div className="card" style={{marginTop:16}}>
                      <div className="card-header"><span className="card-title">Cluster Descriptions</span></div>
                      <ClusterDescriptions descriptions={clusterDescs} scatter={clusterRows} />
                    </div>
                  )}
                </>
              )}
            </>

          ) : activeModel === 'regression' ? (
            <>
              {/* Regression: two drop zones */}
              <div className="analysis-dz-row">
                <div className={`analysis-drop-zone${regrYDzActive ? ' dz-active' : ''}`} style={{maxWidth:220}} {...regrYDzHandlers}>
                  <div className="adz-label"><i className="fa-solid fa-arrow-up-right-dots" style={{marginRight:6}}></i>Y Variable (Target)</div>
                  {regrYFeatures.length === 0
                    ? <div className="adz-hint">Drop 1 target variable here</div>
                    : <div className="adz-chips">
                        {regrYFeatures.map(f => (
                          <span key={f} className="adz-chip">
                            {f}
                            <button onClick={() => setRegrYFeatures([])}>×</button>
                          </span>
                        ))}
                      </div>
                  }
                </div>
                <div className={`analysis-drop-zone${regrXDzActive ? ' dz-active' : ''}`} {...regrXDzHandlers}>
                  <div className="adz-label"><i className="fa-solid fa-arrows-left-right" style={{marginRight:6}}></i>X Variables (Predictors)</div>
                  {regrXFeatures.length === 0
                    ? <div className="adz-hint">Drop one or more predictor variables here</div>
                    : <div className="adz-chips">
                        {regrXFeatures.map(f => (
                          <span key={f} className="adz-chip">
                            {f}
                            <button onClick={() => setRegrXFeatures(prev => prev.filter(x => x !== f))}>×</button>
                          </span>
                        ))}
                      </div>
                  }
                </div>
              </div>

              {!regrRun && (
                <button
                  className="run-analysis-btn"
                  disabled={regrYFeatures.length === 0 && regrXFeatures.length === 0}
                  onClick={runRegression}
                >
                  <i className="fa-solid fa-circle-play"></i>Run Regression Analysis
                </button>
              )}

              {regrRun && (
                <>
                  {regression?.executive_insight && (
                    <div style={{margin:'0 0 14px 0',padding:'14px 18px',borderLeft:'3px solid #FFAD28',background:'rgba(255,173,40,0.05)',borderRadius:'0 var(--radius-sm) var(--radius-sm) 0'}}>
                      <div style={{fontSize:11,fontWeight:700,color:'#FFAD28',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:7}}>
                        <i className="fa-solid fa-lightbulb" style={{marginRight:6}}></i>Executive Insight
                      </div>
                      <div style={{fontSize:13,color:'var(--text)',lineHeight:1.7}}>{regression.executive_insight}</div>
                    </div>
                  )}
                  <ScenarioSimulatorCard regression={regression} />
                  <RegressionEquationCard regression={regression} />
                </>
              )}
            </>

          ) : (
            <>
              {/* Time Series */}
              <div style={{padding:'12px 16px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--radius)',marginBottom:14,fontSize:13,color:'var(--text-2)'}}>
                <i className="fa-solid fa-info-circle" style={{marginRight:8,color:'#FFAD28'}}></i>
                Target variable: <strong style={{color:'var(--text)'}}>Total Portfolio Exposure (£m)</strong> — 24 months historical + 12-month forecast with 95% CI
              </div>

              {!tsRun && (
                <button className="run-analysis-btn" onClick={runTimeSeries}>
                  <i className="fa-solid fa-circle-play"></i>Run Time Series Forecast
                </button>
              )}

              {tsRun && (
                <>
                  <div className="card" style={{marginTop:16}}>
                    <div className="card-header"><span className="card-title"><i className="fa-solid fa-chart-line" style={{marginRight:7,color:'#FFAD28'}}></i>Portfolio Exposure Forecast — Jan 2024 to Dec 2026</span></div>
                    <TimeSeriesChartCard tsHistorical={tsHistorical} tsForecast={tsForecast} />
                  </div>

                  <div className="card" style={{marginTop:16}}>
                    <div className="card-header"><span className="card-title"><i className="fa-solid fa-ranking-star" style={{marginRight:7,color:'#FFAD28'}}></i>Counterparty Growth Ranking (24-Month)</span></div>
                    <GrowthRankingTable growthRows={growthRows} />
                  </div>
                </>
              )}
            </>
          )}

          <ModelSummarySection summary={modelSummary} loading={summaryLoading} />

        </div>
      </div>
    </div>
  );
}



const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
