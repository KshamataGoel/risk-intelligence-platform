function EmailPreviewWindow({ emailText, onClose }) {
  if (!emailText) return null;
  const subjectMatch = emailText.match(/\*\*SUBJECT:\*\*\s*(.+)/);
  const subject = subjectMatch ? subjectMatch[1].trim() : 'Risk Intelligence Summary';
  const handleBackdrop = e => { if (e.target === e.currentTarget) onClose(); };
  const copyEmail = () => navigator.clipboard.writeText(emailText).then(() => alert('Copied to clipboard!'));
  const formatLine = (line, i) => {
    const t = line.replace(/\*\*/g, '');
    if (/^\*\*.*\*\*$/.test(line)) return <div key={i} className="email-body-line-heading">{t}</div>;
    if (line.trim().startsWith('•')) return <div key={i} className="email-body-line-bullet">{line}</div>;
    if (!line.trim()) return <div key={i} style={{height:7}}></div>;
    return <div key={i} className="email-body-line-text">{line}</div>;
  };
  return (
    <div className="vault-summary-overlay" onClick={handleBackdrop}>
      <div className="vault-summary-window" style={{width:660}}>
        <div className="vault-summary-titlebar">
          <div className="vault-summary-titlebar-icon vault-card-icon emails"><i className="fa-solid fa-envelope"></i></div>
          <span className="vault-summary-titlebar-text">Generated Email Preview</span>
          <div className="vault-summary-titlebar-actions">
            <button className="vault-summary-win-btn close-btn" onClick={onClose}><i className="fa-solid fa-xmark"></i></button>
          </div>
        </div>
        <div style={{padding:'10px 20px',background:'var(--bg)',borderBottom:'1px solid var(--border)',flexShrink:0}}>
          <div style={{fontSize:10.5,fontWeight:700,textTransform:'uppercase',letterSpacing:0.5,color:'var(--text-3)',marginBottom:3}}>Subject</div>
          <div style={{fontSize:14,fontWeight:700,color:'var(--text)'}}>{subject}</div>
        </div>
        <div className="vault-summary-body">
          {emailText.split('\n').map((line, i) => formatLine(line, i))}
        </div>
        <div className="vault-summary-footer">
          <span className="vault-summary-footer-left"><i className="fa-solid fa-robot"></i>Generated by Groq AI · llama-3.1-8b-instant</span>
          <div style={{display:'flex',gap:8}}>
            <button className="vault-summary-footer-close" style={{borderColor:'var(--primary)',color:'var(--primary)'}} onClick={copyEmail}>
              <i className="fa-regular fa-copy" style={{marginRight:5}}></i>Copy
            </button>
            <button className="vault-summary-footer-close" onClick={onClose}>Close</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function ReportGeneratorTab() {
  const [sources,        setSources]       = useState(null);
  const [selected,       setSelected]      = useState({ risk: true, regulatory: true, emails: true, insights: true });
  const [fromDate,       setFromDate]      = useState('');
  const [toDate,         setToDate]        = useState('');
  const [includeUndated, setIncludeUndated]= useState(true);
  const [generating,     setGenerating]    = useState(false);
  const [genEmail,       setGenEmail]      = useState(false);
  const [report,         setReport]        = useState(null);
  const [insightsData,   setInsightsData]  = useState(null);
  const [emailText,      setEmailText]     = useState(null);
  const [error,          setError]         = useState(null);
  const reportRef = React.useRef(null);

  useEffect(() => {
    fetch('/api/reports/sources').then(r => r.json()).then(setSources).catch(() => setSources({}));
  }, []);

  const toggle = key => {
    if (sources?.[key]?.available === false) return;
    setSelected(s => ({ ...s, [key]: !s[key] }));
  };
  const anySelected = Object.values(selected).some(Boolean);

  const doGenerate = async () => {
    setGenerating(true); setReport(null); setInsightsData(null); setError(null);
    try {
      const [res] = await Promise.all([
        fetch('/api/reports/generate', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ selectedSources: selected, fromDate, toDate, includeUndated }) }),
        minDelay(8000, 15000)
      ]);
      const data = await res.json();
      setReport(data.report); setInsightsData(data.insightsData);
      setTimeout(() => reportRef.current?.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
    } catch { setError('Failed to generate report. Please check the server is running and try again.'); }
    setGenerating(false);
  };

  const doEmail = async () => {
    setGenEmail(true); setEmailText(null); setError(null);
    try {
      const res = await fetch('/api/reports/email', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ selectedSources: selected, fromDate, toDate, includeUndated })
      });
      const data = await res.json();
      setEmailText(data.email);
    } catch { setError('Failed to generate email.'); }
    setGenEmail(false);
  };

  return (
    <div style={{maxWidth:1080, margin:'0 auto'}}>

      {/* Centred header */}
      <div className="report-page-header">
        <div className="report-page-title">Intelligence Summary</div>
        <div className="report-page-sub">Select sources and a date range, then generate an executive intelligence brief.</div>
      </div>

      {/* Source cards */}
      <div className="report-sources-grid">
        {REPORT_SOURCES.map(src => {
          const avail = sources?.[src.key];
          const isSel = selected[src.key] && avail?.available !== false;
          const unavail = avail?.available === false;
          return (
            <div key={src.key} className={`report-source-card${isSel ? ' selected' : ''}${unavail ? ' unavailable' : ''}`} onClick={() => toggle(src.key)}>
              <div className="report-source-check">{isSel && <i className="fa-solid fa-check"></i>}</div>
              <div className={`report-source-icon ${src.cls}`}><i className={`fa-solid ${src.icon}`}></i></div>
              <div className="report-source-name">{src.label}</div>
              <div className="report-source-count">
                {avail == null ? '…' : unavail ? 'Not available' : `${avail.count} ${src.key === 'insights' ? 'datasets' : 'documents'} available`}
              </div>
              <div className="report-source-desc">{src.desc}</div>
            </div>
          );
        })}
      </div>

      {/* Date range */}
      <div className="report-date-section">
        <div className="report-date-title"><i className="fa-regular fa-calendar" style={{marginRight:6}}></i>Date Range</div>
        <div className="report-date-row">
          <div className="report-date-field">
            <label className="report-date-label">From Date</label>
            <input type="date" className="report-date-input" value={fromDate} onChange={e => setFromDate(e.target.value)} />
          </div>
          <div className="report-date-arrow"><i className="fa-solid fa-arrow-right"></i></div>
          <div className="report-date-field">
            <label className="report-date-label">To Date</label>
            <input type="date" className="report-date-input" value={toDate} onChange={e => setToDate(e.target.value)} />
          </div>
        </div>
        <div className="report-undated-row">
          <input type="checkbox" id="includeUndated" checked={includeUndated} onChange={e => setIncludeUndated(e.target.checked)} />
          <label htmlFor="includeUndated">Include records with no date</label>
        </div>
      </div>

      {/* Action buttons */}
      <div className="report-actions">
        <button className="report-action-btn primary" onClick={doGenerate} disabled={!anySelected || generating}>
          {generating
            ? <><div className="spinner" style={{width:14,height:14,borderWidth:2,borderTopColor:'#fff'}}></div>Generating Report…</>
            : <><i className="fa-solid fa-file-lines"></i>Generate Report</>}
        </button>
        <button className="report-action-btn secondary" onClick={doEmail} disabled={!anySelected || genEmail}>
          {genEmail
            ? <><div className="spinner" style={{width:14,height:14,borderWidth:2}}></div>Generating Email…</>
            : <><i className="fa-solid fa-envelope"></i>Generate Email</>}
        </button>
      </div>

      {generating && (
        <ProcessingView
          title="Composing Intelligence Report"
          icon="fa-file-lines"
          messages={[
            'Ingesting source documents…',
            'Extracting key risk narratives…',
            'Correlating regulatory data points…',
            'Structuring executive summary…',
            'Cross-referencing compliance signals…',
            'Compiling intelligence brief…',
            'Applying report formatting…',
          ]}
        />
      )}

      {error && (
        <div className="alert alert-warning" style={{marginTop:16}}>
          <i className="fa-solid fa-triangle-exclamation alert-icon"></i>
          <div>{error}</div>
        </div>
      )}

      {/* Report output */}
      {report && (
        <div className="report-output" ref={reportRef}>
          <div className="report-output-header">
            <div>
              <div className="report-output-title"><i className="fa-solid fa-file-shield" style={{marginRight:8}}></i>Executive Intelligence Report</div>
              <div className="report-output-meta">
                {report.metadata?.docsIncluded} source{report.metadata?.docsIncluded !== 1 ? 's' : ''} included
                {' · '}Generated {new Date(report.metadata?.generatedAt).toLocaleString('en-GB', { dateStyle:'medium', timeStyle:'short' })}
                {(fromDate || toDate) && ` · ${fromDate || 'All'} → ${toDate || 'Present'}`}
              </div>
            </div>
            <button className="report-print-btn" onClick={() => window.print()}>
              <i className="fa-solid fa-print"></i>Export PDF
            </button>
          </div>
          <div className="report-body">
            {report.sections.map((sec, i) => {
              const icon = REPORT_SECTION_ICONS[sec.title.toLowerCase()] || 'fa-circle-dot';
              return (
                <div key={i} className="report-section">
                  <div className="report-section-title">
                    <i className={`fa-solid ${icon}`}></i>{sec.title}
                  </div>
                  <div className="report-section-content">{sec.content}</div>
                </div>
              );
            })}
            {insightsData && <ReportCharts insightsData={insightsData} fromDate={report.metadata?.fromDate} toDate={report.metadata?.toDate} />}
          </div>
        </div>
      )}

      {emailText && <EmailPreviewWindow emailText={emailText} onClose={() => setEmailText(null)} />}
    </div>
  );
}

function ReportsPage() {
  return <div className="page" style={{maxWidth:1080}}><ReportGeneratorTab /></div>;
}

// ── Analysis Page ─────────────────────────────────────────────────────────────
function AnalysisPage() {
  const [data,             setData]            = useState(null);
  const [loading,          setLoading]         = useState(true);
  const [error,            setError]           = useState(null);
  const [selectedFeatures, setSelectedFeatures]= useState([]);
  const [clusterDescs,     setClusterDescs]    = useState(null);
  const [descLoading,      setDescLoading]     = useState(false);
  const [xCol,             setXCol]            = useState('');
  const [yCol,             setYCol]            = useState('');

  const [catSearch,  setCatSearch]  = useState('');
  const [catFilter,  setCatFilter]  = useState('All');
  const [riskFilter, setRiskFilter] = useState('All');

  const [scatterCluster, setScatterCluster] = useState('All');
  const [scatterRisk,    setScatterRisk]    = useState('All');

  const [aCluster, setACluster] = useState('All');
  const [aRisk,    setARisk]    = useState('All');
  const [aStatus,  setAStatus]  = useState('All');
  const [aType,    setAType]    = useState('All');

  const [refreshing,      setRefreshing]      = useState(false);
  const [insightsSummary, setInsightsSummary] = useState(null);
  const [summaryLoading,  setSummaryLoading]  = useState(false);
  const [modelRun,        setModelRun]        = useState(false);
  const [modelRunning,    setModelRunning]    = useState(false);

  const loadData = (isRefresh = false) => {
    if (isRefresh) setRefreshing(true); else setLoading(true);
    setError(null);
    fetch('/api/analysis/data').then(r => r.json()).then(d => {
      if (d.available) { setData(d); setClusterDescs(null); setSelectedFeatures([]); }
      else setError(d.message);
    }).catch(() => setError('Failed to load analysis data.'))
      .finally(() => { setLoading(false); setRefreshing(false); });
  };

  useEffect(() => { loadData(); }, []);

  const toggleFeature = name => setSelectedFeatures(prev =>
    prev.includes(name) ? prev.filter(f => f !== name) : [...prev, name]
  );

  const scatterNumericCols = data ? (data.scatter_numeric_cols || []) : [];

  // Reset model when features change
  useEffect(() => {
    setModelRun(false);
    setClusterDescs(null);
    setInsightsSummary(null);
    if (selectedFeatures.length < 2) { setXCol(''); setYCol(''); return; }
    setXCol(prev => scatterNumericCols.includes(prev) ? prev : (scatterNumericCols[0] || ''));
    setYCol(prev => {
      if (scatterNumericCols.includes(prev) && prev !== scatterNumericCols[0]) return prev;
      return scatterNumericCols[1] || scatterNumericCols[0] || '';
    });
  }, [selectedFeatures.join(',')]);

  const loadClusterDescs = async () => {
    setDescLoading(true);
    setInsightsSummary(null);
    try {
      const res = await fetch('/api/analysis/cluster-descriptions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ selectedCols: scatterNumericCols })
      });
      const json = await res.json();
      setClusterDescs(json.descriptions);
    } catch {}
    setDescLoading(false);
  };

  const runModel = async () => {
    setModelRunning(true);
    await minDelay(15000, 20000);
    await loadClusterDescs();
    setModelRun(true);
    setModelRunning(false);
  };

  // Auto-generate insights summary after cluster descriptions load
  useEffect(() => {
    if (!clusterDescs || !data) return;
    setSummaryLoading(true);
    const anomalyRows = data.anomaly_data || [];
    const anomalySummary = {
      total:     anomalyRows.length,
      highRisk:  anomalyRows.filter(a => String(a['Risk Rating']||'').toLowerCase().includes('high')).length,
      escalated: anomalyRows.filter(a => { const s = String(a['Investigation Status']||'').toLowerCase(); return s.includes('mlro')||s.includes('escal'); }).length,
    };
    fetch('/api/analysis/insights-summary', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ clusterDescriptions: clusterDescs, anomalySummary })
    }).then(r => r.json()).then(j => setInsightsSummary(j.summary)).catch(() => {}).finally(() => setSummaryLoading(false));
  }, [clusterDescs]);

  if (loading) return (
    <div className="page">
      <div className="page-header"><div className="page-title">Analytics Lab</div></div>
      <div className="spinner-wrap"><div className="spinner"></div><span>Loading analysis data…</span></div>
    </div>
  );

  if (error) return (
    <div className="page">
      <div className="page-header"><div className="page-title">Analytics Lab</div></div>
      <div className="alert alert-info"><i className="fa-solid fa-folder-open alert-icon"></i>{error}</div>
    </div>
  );

  const catalogue  = data.feature_catalogue || [];
  const scatter    = data.scatter_data       || [];
  const anomalies  = data.anomaly_data       || [];
  const loadedAt   = data.loaded_at ? new Date(data.loaded_at).toLocaleTimeString() : '';

  const categories = ['All', ...new Set(catalogue.map(f => f['Category']).filter(Boolean))];
  const riskLevels = ['All', ...new Set(catalogue.map(f => f['Risk Relevance']).filter(Boolean))];

  const filteredCat = catalogue.filter(f => {
    const nm = (f['Feature Name'] || '').toLowerCase();
    const ds = (f['Description']  || '').toLowerCase();
    const q  = catSearch.toLowerCase();
    return (!q || nm.includes(q) || ds.includes(q))
        && (catFilter  === 'All' || f['Category']      === catFilter)
        && (riskFilter === 'All' || f['Risk Relevance'] === riskFilter);
  });

  const scatterClusters = ['All', ...new Set(scatter.map(r => r['Cluster Label'] || r['Cluster']).filter(Boolean))];
  const scatterRisks    = ['All', ...new Set(scatter.map(r => r['Risk Rating']).filter(Boolean))];

  const filteredScatter = scatter.filter(r =>
    (scatterCluster === 'All' || (r['Cluster Label'] || r['Cluster']) === scatterCluster) &&
    (scatterRisk    === 'All' || r['Risk Rating'] === scatterRisk)
  );

  const aClusters = ['All', ...new Set(anomalies.map(a => a['Cluster Label'] || a['Cluster']).filter(Boolean))];
  const aRisks    = ['All', ...new Set(anomalies.map(a => a['Risk Rating']).filter(Boolean))];
  const aStatuses = ['All', ...new Set(anomalies.map(a => a['Investigation Status']).filter(Boolean))];
  const aTypes    = ['All', ...new Set(anomalies.map(a => a['Anomaly Type']).filter(Boolean))];

  const filteredAnomalies = anomalies.filter(a =>
    (aCluster === 'All' || (a['Cluster Label'] || a['Cluster']) === aCluster) &&
    (aRisk    === 'All' || a['Risk Rating']          === aRisk) &&
    (aStatus  === 'All' || a['Investigation Status'] === aStatus) &&
    (aType    === 'All' || a['Anomaly Type']         === aType)
  );

  const highRiskCount      = anomalies.filter(a => String(a['Risk Rating']||'').toLowerCase().includes('high')).length;
  const escalatedCount     = anomalies.filter(a => { const s = String(a['Investigation Status']||'').toLowerCase(); return s.includes('mlro')||s.includes('escal'); }).length;
  const investigatingCount = anomalies.filter(a => String(a['Investigation Status']||'').toLowerCase().includes('invest')).length;
  const monitoringCount    = anomalies.filter(a => String(a['Investigation Status']||'').toLowerCase().includes('monitor')).length;
  const maxDistance        = Math.max(0, ...anomalies.map(a => parseFloat(a['Distance from Centroid']) || 0));

  // Determine right panel state: needs 2+ features selected
  const analysisReady = selectedFeatures.length >= 2;

  return (
    <div className="page">
      <div className="page-header" style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
        <div>
          <div className="page-title">Analytics Lab</div>
          <div className="page-sub">K-Means clustering, feature catalogue and anomaly detection for AML risk review</div>
        </div>
        <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4}}>
          <button
            onClick={() => loadData(true)}
            disabled={refreshing}
            style={{display:'flex',alignItems:'center',gap:7,padding:'8px 16px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--radius)',color:'var(--text)',fontSize:13,fontWeight:600,cursor:refreshing?'not-allowed':'pointer',opacity:refreshing?0.6:1,whiteSpace:'nowrap'}}
          >
            <i className={`fa-solid fa-rotate-right${refreshing?' fa-spin':''}`}></i>
            {refreshing ? 'Refreshing…' : 'Refresh Data'}
          </button>
          {data?.loaded_at && (
            <span style={{fontSize:11,color:'var(--text-muted)'}}>
              Last loaded: {new Date(data.loaded_at).toLocaleTimeString()}
            </span>
          )}
        </div>
      </div>


      {/* Selected Features Panel */}
      <SelectedFeaturesPanel features={selectedFeatures} onRemove={toggleFeature} />

      {/* Two-column layout */}
      <div className="analysis-layout">

        {/* Left: Feature Catalogue */}
        <div className="analysis-left">
          <div className="card" style={{padding:'16px'}}>
            <div className="card-header" style={{marginBottom:12}}>
              <span className="card-title">Feature Catalogue</span>
              <span style={{fontSize:12,color:'var(--text-3)'}}>{filteredCat.length} features</span>
            </div>
            <input className="input-box" style={{marginBottom:8,fontSize:13,padding:'8px 12px'}}
              placeholder="Search features…" value={catSearch} onChange={e => setCatSearch(e.target.value)} />
            <select className="analysis-select" style={{marginBottom:6}} value={catFilter} onChange={e => setCatFilter(e.target.value)}>
              {categories.map(c => <option key={c}>{c}</option>)}
            </select>
            <select className="analysis-select" style={{marginBottom:12}} value={riskFilter} onChange={e => setRiskFilter(e.target.value)}>
              {riskLevels.map(r => <option key={r}>{r}</option>)}
            </select>
            <div className="feature-list">
              {filteredCat.map((f, i) => (
                <FeatureCard key={i} feature={f} selected={selectedFeatures.includes(f['Feature Name'])} onClick={() => toggleFeature(f['Feature Name'])} />
              ))}
              {!filteredCat.length && <div style={{color:'var(--text-3)',fontSize:13,textAlign:'center',padding:20}}>No features match filters.</div>}
            </div>
          </div>
        </div>

        {/* Right: Main Analysis — 3-state panel */}
        <div className="analysis-right">

          {selectedFeatures.length === 0 ? (
            /* State 0: No features selected */
            <div className="analysis-instruction">
              <div className="analysis-instruction-icon">
                <i className="fa-solid fa-wand-magic-sparkles"></i>
              </div>
              <div className="analysis-instruction-title">Select features to begin</div>
              <div className="analysis-instruction-sub">
                Select or drag features from the Feature Catalogue to start analysis.
              </div>
            </div>

          ) : !analysisReady ? (
            /* State 1: Features selected but fewer than 2 */
            <div className="analysis-instruction">
              <div className="analysis-instruction-icon">
                <i className="fa-solid fa-chart-scatter"></i>
              </div>
              <div className="analysis-instruction-title">{selectedFeatures.length} feature selected</div>
              <div className="analysis-instruction-sub">Select at least one more feature to unlock the model.</div>
            </div>

          ) : !modelRun ? (
            /* State 2: 2+ features selected — ready to run */
            modelRunning ? (
              <ProcessingView
                title="Running Analytical Model"
                icon="fa-magnifying-glass-chart"
                messages={[
                  'Loading feature matrix…',
                  'Initialising K-Means cluster algorithm…',
                  'Running centroid convergence iterations…',
                  'Evaluating silhouette scores…',
                  'Computing anomaly boundary distances…',
                  'Building cluster risk profiles…',
                  'Generating model commentary…',
                  'Validating statistical outputs…',
                ]}
              />
            ) : (
            <div className="analysis-instruction">
              <div className="analysis-instruction-icon" style={{background:'rgba(139,28,28,0.1)',color:'var(--primary)'}}>
                <i className="fa-solid fa-play"></i>
              </div>
              <div className="analysis-instruction-title">{selectedFeatures.length} features ready</div>
              <div className="analysis-instruction-sub" style={{marginBottom:20}}>
                Click <strong>Run Model</strong> to generate the scatter plot, cluster descriptions, anomaly detection, and insights summary.
              </div>
              <button
                onClick={runModel}
                className="btn-primary"
                style={{fontSize:14,padding:'10px 28px',display:'inline-flex',alignItems:'center',gap:8}}
              >
                <i className="fa-solid fa-circle-play"></i> Run Model
              </button>
            </div>
            )

          ) : (
            /* State 3: Model has been run — full analysis */
            <>
              <div className="card" style={{marginBottom:16}}>
                <div className="card-header">
                  <span className="card-title">Transaction Behaviour Clusters</span>
                  <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                    {selectedFeatures.slice(0,3).map(f => (
                      <span key={f} className="sfp-chip" style={{fontSize:11}}>{f}</span>
                    ))}
                    {selectedFeatures.length > 3 && <span className="sfp-chip" style={{fontSize:11}}>+{selectedFeatures.length-3} more</span>}
                  </div>
                </div>

                {/* Scatter filters */}
                <div className="scatter-filters">
                  <select className="analysis-select" value={scatterCluster} onChange={e => setScatterCluster(e.target.value)}>
                    {scatterClusters.map(c => <option key={c}>{c}</option>)}
                  </select>
                  <select className="analysis-select" value={scatterRisk} onChange={e => setScatterRisk(e.target.value)}>
                    {scatterRisks.map(r => <option key={r}>{r}</option>)}
                  </select>
                  <span style={{fontSize:12,color:'var(--text-3)',alignSelf:'center'}}>{filteredScatter.length} parties</span>
                </div>

                {/* X/Y axis selectors */}
                <div className="axis-selectors">
                  <span className="axis-label">X Axis:</span>
                  <select className="analysis-select" value={xCol} onChange={e => setXCol(e.target.value)}>
                    {scatterNumericCols.map(c => <option key={c} value={c}>{c}</option>)}
                  </select>
                  <span className="axis-label" style={{marginLeft:4}}>Y Axis:</span>
                  <select className="analysis-select" value={yCol} onChange={e => setYCol(e.target.value)}>
                    {scatterNumericCols.map(c => <option key={c} value={c}>{c}</option>)}
                  </select>
                </div>

                <ScatterPlotChart data={filteredScatter} xCol={xCol} yCol={yCol} />
              </div>

              <div className="card" style={{marginBottom:16}}>
                <div className="card-header">
                  <span className="card-title">Cluster Descriptions</span>
                  {descLoading && (
                    <span style={{display:'flex',alignItems:'center',gap:6,fontSize:12,color:'var(--text-3)'}}>
                      <div className="spinner" style={{width:13,height:13,borderWidth:2}}></div> Generating…
                    </span>
                  )}
                </div>
                <ClusterDescriptions descriptions={clusterDescs} scatter={scatter} />
              </div>

              <AnomalySection
                anomalies={filteredAnomalies}   allAnomalies={anomalies}
                highRiskCount={highRiskCount}   escalatedCount={escalatedCount}
                investigatingCount={investigatingCount} monitoringCount={monitoringCount}
                maxDistance={maxDistance}
                selectedFeatures={selectedFeatures}
                filters={{ aCluster, aRisk, aStatus, aType }}
                filterOptions={{ aClusters, aRisks, aStatuses, aTypes }}
                onFilter={(key, val) => {
                  if (key==='cluster') setACluster(val);
                  if (key==='risk')    setARisk(val);
                  if (key==='status')  setAStatus(val);
                  if (key==='type')    setAType(val);
                }}
              />
            </>
          )}

          {/* Insights Quick Summary */}
          {(summaryLoading || insightsSummary) && (
            <div className="card" style={{marginTop:16}}>
              <div className="card-header">
                <span className="card-title"><i className="fa-solid fa-lightbulb" style={{marginRight:7,color:'#D97706'}}></i>Analytics Intelligence Summary</span>
                {summaryLoading && (
                  <span style={{display:'flex',alignItems:'center',gap:6,fontSize:12,color:'var(--text-3)'}}>
                    <div className="spinner" style={{width:13,height:13,borderWidth:2}}></div> Generating…
                  </span>
                )}
              </div>
              {insightsSummary && (() => {
                const sections = parseInsightsSections(insightsSummary);
                if (sections.length >= 3) {
                  return (
                    <div className="insights-summary-sections">
                      {sections.map((s, i) => (
                        <div key={i} className="insights-summary-section">
                          <div className="insights-summary-section-label">
                            <i className={`fa-solid ${INSIGHTS_SECTION_ICONS[i] || 'fa-circle'}`}></i>
                            {s.num}. {s.label}
                          </div>
                          <div className="insights-summary-section-content">{s.content}</div>
                        </div>
                      ))}
                    </div>
                  );
                }
                return (
                  <div style={{padding:'14px 18px',fontSize:14,color:'var(--text)',lineHeight:1.75,borderLeft:'3px solid #D97706',margin:'0 0 4px 0',background:'rgba(217,119,6,0.04)',borderRadius:'0 var(--radius) var(--radius) 0'}}>
                    {insightsSummary}
                  </div>
                );
              })()}
            </div>
          )}

          {/* Source note */}
          <div className="source-note" style={{marginTop:12}}>
            <i className="fa-solid fa-database"></i>
            Source: Approved Excel datasets only — no external data used.
            {loadedAt && <span style={{marginLeft:8}}>Loaded at {loadedAt}</span>}
          </div>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
